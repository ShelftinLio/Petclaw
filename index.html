<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Claw 🦞</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    *::-webkit-scrollbar { display: none; }
    :root {
        --hud-bg: rgba(246, 246, 242, 0.94);
        --hud-bg-dark: rgba(18, 18, 18, 0.92);
        --hud-line: #111111;
        --hud-muted: #6f6f6f;
        --hud-text: #111111;
        --hud-invert: #f7f7f2;
        --pixel-shadow: 0 0 0 1px rgba(255,255,255,0.7), 0 5px 0 rgba(0,0,0,0.34);
    }
    html, body {
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }
    .container {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        position: relative;
        padding: 0 10px 0;
    }

    /* ===== 流体球 67px ===== */
    .pet-wrapper {
        width: 67px;
        height: 67px;
        position: relative;
        cursor: grab;
        will-change: transform;
    }
    .pet-wrapper:active { cursor: grabbing; }

    .inner-fluid {
        position: absolute;
        top: 3px; left: 3px; right: 3px; bottom: 3px;
        border-radius: 50%;
        overflow: hidden;
        z-index: 1;
        background: linear-gradient(135deg, #ffb3b3, #fed6e3);
        transition: filter 0.4s ease;
    }
    .fluid-blob {
        position: absolute;
        width: 130%; height: 130%; top: -15%; left: -15%;
        background:
            radial-gradient(circle at 30% 30%, rgba(235,87,87,0.85), transparent 40%),
            radial-gradient(circle at 70% 65%, rgba(255,154,108,0.8), transparent 40%);
        animation: fluid-spin 8s linear infinite;
    }
    .fluid-blob-2 {
        position: absolute;
        width: 110%; height: 110%; top: -5%; left: -5%;
        background:
            radial-gradient(circle at 60% 30%, rgba(255,200,150,0.4), transparent 35%),
            radial-gradient(circle at 35% 70%, rgba(220,60,60,0.3), transparent 35%);
        animation: fluid-spin-r 12s linear infinite;
    }

    .glass-shell {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        border-radius: 50%; z-index: 2;
        /* 🔮 琉璃感：匹配Landing Page通透效果 */
        background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.12), rgba(255,255,255,0.03));
        box-shadow:
            inset -2px -2px 8px rgba(255,255,255,0.08),
            inset 2px 2px 8px rgba(255,255,255,0.35),
            0px 2px 6px rgba(220,80,80,0.08);
        border: 1px solid rgba(255,255,255,0.25);
        transition: box-shadow 1.0s cubic-bezier(0.4, 0.0, 0.2, 1), border 1.0s cubic-bezier(0.4, 0.0, 0.2, 1);
    }
    .glass-shell::before {
        content: '';
        position: absolute; top: 12%; left: 18%; width: 28%; height: 14%;
        border-radius: 50%; 
        background: rgba(255,255,255,0.55);
        filter: blur(1px); 
        transform: rotate(-40deg);
        transition: opacity 1.0s cubic-bezier(0.4, 0.0, 0.2, 1);
    }
    .glass-shell::after {
        content: '';
        position: absolute; bottom: 22%; right: 20%; width: 16%; height: 10%;
        border-radius: 50%;
        background: rgba(255,255,255,0.2);
        filter: blur(1px);
        transform: rotate(25deg);
        transition: opacity 1.0s cubic-bezier(0.4, 0.0, 0.2, 1);
    }

    /* 胶囊眼睛 — 大占比 */
    .eyes-container {
        position: absolute; z-index: 3;
        top: 16%; left: 10%; width: 80%; height: 50%;
        display: flex; justify-content: center; align-items: center;
        gap: 12px;
        pointer-events: none;
        overflow: visible;
    }
    .eye {
        width: 11px; height: 19px;
        background: white;
        border-radius: 6px;
        box-shadow: 0 0 8px rgba(255,255,255,0.9), 0 0 16px rgba(255,255,255,0.4);
        transition: width 0.18s, height 0.18s, border-radius 0.18s, transform 0.18s cubic-bezier(0.25, 1, 0.5, 1);
        transform-origin: center center;
    }

    /* 腮红 */
    .blush {
        position: absolute; z-index: 3;
        width: 14px; height: 8px; border-radius: 50%;
        background: rgba(255,130,130,0.25); filter: blur(3px);
        pointer-events: none; 
        /* 🎨 2秒平滑过渡 */
        transition: background 2.0s cubic-bezier(0.33, 0.0, 0.2, 1), opacity 0.6s ease; 
        opacity: 0.8;
    }
    .blush-l { top: 58%; left: 8%; }
    .blush-r { top: 58%; right: 8%; }

    /* 气泡装饰 */
    .bub {
        position: absolute; border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), rgba(255,255,255,0.06));
        border: 1px solid rgba(255,255,255,0.12);
        z-index: 0; opacity: 0; pointer-events: none;
    }
    .bub-1 { width: 5px; height: 5px; left: -5px; top: 60%; animation: bub 5s ease-in infinite 0s; }
    .bub-2 { width: 3px; height: 3px; right: -4px; top: 40%; animation: bub 6.5s ease-in infinite 2s; }

    .particles {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 10;
    }

    /* ===== 图标工具栏 ===== */
    .toolbar {
        position: absolute;
        bottom: 116px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 6px;
        padding: 6px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.16s steps(2), transform 0.16s steps(2);
        z-index: 20;
        background: var(--hud-bg);
        border: 2px solid var(--hud-line);
        box-shadow: var(--pixel-shadow);
        clip-path: polygon(6px 0, calc(100% - 6px) 0, 100% 6px, 100% calc(100% - 6px), calc(100% - 6px) 100%, 6px 100%, 0 calc(100% - 6px), 0 6px);
    }
    .toolbar.show {
        opacity: 1;
        pointer-events: auto;
        transform: translateX(-50%) translateY(-4px);
    }

    .tool-icon {
        width: 30px; height: 30px;
        border-radius: 0;
        border: 2px solid var(--hud-line);
        background: #ffffff;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        transition: transform 0.12s steps(2), border-color 0.12s steps(2), background 0.12s steps(2);
        box-shadow: inset -2px -2px 0 rgba(0,0,0,0.18);
    }
    .tool-icon svg {
        width: 15px; height: 15px;
        stroke: var(--hud-text); fill: none;
        stroke-width: 2; stroke-linecap: square; stroke-linejoin: miter;
    }
    .tool-icon:hover {
        transform: translateY(-2px);
        border-color: var(--hud-line);
        background: #111111;
    }
    .tool-icon:hover svg { stroke: var(--hud-invert); }
    .tool-icon:active { transform: translateY(1px); }

    .tool-icon.active {
        background: #e8e8e2;
        box-shadow: inset -2px -2px 0 rgba(0,0,0,0.18), 0 0 0 2px rgba(255,255,255,0.7);
    }

    /* 输入条 */
    .input-bar {
        position: absolute;
        bottom: 122px;
        left: 50%;
        transform: translateX(-50%);
        display: grid;
        grid-template-rows: auto auto;
        gap: 5px;
        padding: 6px;
        width: 236px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.16s steps(2), transform 0.16s steps(2);
        z-index: 20;
        background: var(--hud-bg);
        border: 2px solid var(--hud-line);
        box-shadow: var(--pixel-shadow);
        clip-path: polygon(6px 0, calc(100% - 6px) 0, 100% 6px, 100% calc(100% - 6px), calc(100% - 6px) 100%, 6px 100%, 0 calc(100% - 6px), 0 6px);
    }
    .input-bar.show {
        opacity: 1;
        pointer-events: auto;
        transform: translateX(-50%) translateY(-4px);
    }
    .conversation-input-row {
        display: grid;
        grid-template-columns: 1fr 30px;
        gap: 5px;
        min-width: 0;
    }
    .conversation-tools-row {
        display: flex;
        align-items: center;
        gap: 5px;
        min-width: 0;
        height: 24px;
    }
    .input-bar input {
        width: 100%;
        height: 30px;
        min-width: 0;
        padding: 6px 8px;
        border: 2px solid var(--hud-line);
        border-radius: 0;
        background: #ffffff;
        color: var(--hud-text);
        font-size: 11px;
        outline: none;
        letter-spacing: 0;
    }
    .input-bar button {
        width: 30px;
        min-width: 30px;
        height: 30px;
        padding: 0;
        border: 2px solid var(--hud-line);
        border-radius: 0;
        background: #111111;
        color: var(--hud-invert);
        font-size: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .input-bar .conversation-send-button {
        font-size: 16px;
        font-weight: 900;
        line-height: 1;
    }
    .input-bar button svg {
        width: 14px;
        height: 14px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: square;
        stroke-linejoin: miter;
    }
    .input-bar .conversation-mode-button {
        width: auto;
        min-width: 54px;
        height: 24px;
        padding: 0 7px;
        background: #ffffff;
        color: var(--hud-text);
        font-size: 9px;
        font-weight: 900;
        text-transform: uppercase;
    }
    .input-bar .conversation-mode-button.openclaw {
        background: #111111;
        color: var(--hud-invert);
    }
    .input-bar #conversationHistoryButton {
        width: 28px;
        min-width: 28px;
        height: 24px;
    }
    .conversation-tools-row button svg {
        width: 13px;
        height: 13px;
    }
    .conversation-status {
        display: none;
        flex: 1;
        min-width: 0;
        padding: 0;
        color: #111111;
        font-size: 9px;
        font-weight: 800;
        line-height: 1.1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        overflow-wrap: normal;
    }
    .conversation-status.show {
        display: block;
    }
    .conversation-status.error {
        color: #7a0000;
    }

    .reply-bubble,
    .conversation-panel {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        width: 238px;
        border: 2px solid var(--hud-line);
        background: rgba(255, 255, 255, 0.98);
        color: var(--hud-text);
        box-shadow: var(--pixel-shadow);
        z-index: 36;
        clip-path: polygon(7px 0, calc(100% - 7px) 0, 100% 7px, 100% calc(100% - 7px), calc(100% - 7px) 100%, 7px 100%, 0 calc(100% - 7px), 0 7px);
    }
    .reply-bubble {
        bottom: 118px;
        display: none;
        padding: 9px 10px;
        gap: 4px;
        line-height: 1.36;
    }
    .reply-bubble.show {
        display: grid;
    }
    .reply-bubble-header {
        display: grid;
        grid-template-columns: 1fr 18px 22px;
        align-items: start;
        gap: 6px;
        min-width: 0;
    }
    .reply-bubble-sender,
    .conversation-title {
        font-size: 15px;
        font-weight: 900;
        line-height: 1.16;
        color: #000000;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        text-transform: none;
    }
    .reply-bubble-state {
        width: 18px;
        height: 18px;
        border: 2px solid #8d8d8d;
        border-radius: 50%;
        align-self: center;
        position: relative;
    }
    .reply-bubble.pending .reply-bubble-state {
        border-color: #a0a0a0;
        border-top-color: #111111;
        animation: reply-spin 0.85s linear infinite;
    }
    .reply-bubble.ready .reply-bubble-header {
        grid-template-columns: 1fr 22px;
    }
    .reply-bubble.ready .reply-bubble-state {
        display: none;
    }
    .reply-bubble-collapse {
        width: 22px;
        height: 22px;
        border: 2px solid #dddddd;
        border-radius: 50%;
        background: #ffffff;
        color: #111111;
        font-size: 18px;
        font-weight: 800;
        line-height: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .reply-bubble-text {
        max-height: 88px;
        overflow: hidden;
        font-size: 13px;
        font-weight: 800;
        line-height: 1.36;
        overflow-wrap: anywhere;
        color: #050505;
    }
    .reply-bubble-text p,
    .conversation-message p {
        margin: 0 0 6px;
    }
    .reply-bubble-text p:last-child,
    .conversation-message p:last-child {
        margin-bottom: 0;
    }
    .reply-bubble-text ul,
    .reply-bubble-text ol,
    .conversation-message ul,
    .conversation-message ol {
        margin: 0 0 6px 15px;
        padding: 0;
    }
    .reply-bubble-text li,
    .conversation-message li {
        margin: 2px 0;
    }
    .reply-bubble-text code,
    .conversation-message code {
        padding: 0 3px;
        border: 1px solid var(--hud-line);
        background: #eeeeea;
        color: #050505;
        font-family: Consolas, 'Courier New', monospace;
        font-size: 11px;
        font-weight: 800;
    }
    .reply-bubble-text pre,
    .conversation-message pre {
        margin: 0 0 6px;
        padding: 5px;
        border: 2px solid var(--hud-line);
        background: #eeeeea;
        color: #050505;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        font-family: Consolas, 'Courier New', monospace;
        font-size: 11px;
        line-height: 1.28;
    }
    .reply-bubble-text a,
    .conversation-message a {
        color: #000000;
        text-decoration: underline;
        pointer-events: auto;
    }
    .reply-bubble.expanded {
        bottom: 96px;
    }
    .reply-bubble.expanded .reply-bubble-text {
        max-height: 188px;
        overflow-y: auto !important;
        padding-right: 2px;
    }
    .reply-bubble-toggle {
        display: none;
        justify-self: end;
        width: auto;
        min-width: 42px;
        height: 22px;
        padding: 0 7px;
        border: 2px solid var(--hud-line);
        border-radius: 0;
        background: #111111;
        color: var(--hud-invert);
        font-size: 10px;
        font-weight: 900;
        line-height: 1;
        cursor: pointer;
    }
    .reply-bubble.has-more .reply-bubble-toggle {
        display: block;
    }
    .reply-bubble-next {
        display: none;
        justify-self: end;
        width: auto;
        min-width: 46px;
        height: 22px;
        padding: 0 8px;
        border: 2px solid var(--hud-line);
        border-radius: 0;
        background: #ffffff;
        color: #111111;
        font-size: 10px;
        font-weight: 900;
        line-height: 1;
        cursor: pointer;
        box-shadow: inset -2px -2px 0 rgba(0,0,0,0.14);
    }
    .reply-bubble.ready .reply-bubble-next {
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .reply-bubble.pending .reply-bubble-next {
        display: none;
    }
    .conversation-dock-button {
        position: absolute;
        right: 14px;
        bottom: 82px;
        width: 38px;
        height: 38px;
        border: 2px solid #d7d7d7;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 3px 0 rgba(0,0,0,0.16);
        z-index: 38;
        display: none;
        align-items: center;
        justify-content: center;
        cursor: pointer;
    }
    .conversation-dock-button.show {
        display: flex;
    }
    .conversation-dock-status {
        width: 17px;
        height: 17px;
        border: 2px solid #8d8d8d;
        border-radius: 50%;
        position: relative;
    }
    .conversation-dock-button.pending .conversation-dock-status {
        border-color: #a0a0a0;
        border-top-color: #111111;
        animation: reply-spin 0.85s linear infinite;
    }
    .conversation-dock-button.ready .conversation-dock-status {
        width: 13px;
        height: 13px;
        border: 0;
        border-right: 3px solid #555555;
        border-bottom: 3px solid #555555;
        border-radius: 0;
        transform: rotate(-45deg);
    }
    .conversation-dock-button.ready .conversation-dock-status::after {
        content: '';
        position: absolute;
        inset: 0;
    }
    .conversation-panel {
        bottom: 116px;
        display: none;
        max-height: 224px;
        padding: 8px;
        overflow-y: auto !important;
        gap: 6px;
    }
    .conversation-panel.show {
        display: grid;
    }
    .conversation-list {
        display: grid;
        gap: 5px;
    }
    .conversation-entry {
        display: grid;
        gap: 2px;
        padding: 6px;
        border: 2px solid var(--hud-line);
        background: #f7f7f2;
        font-size: 11px;
        line-height: 1.28;
        overflow-wrap: anywhere;
    }
    .conversation-entry.agent {
        background: #fff1bd;
    }
    .conversation-sender {
        font-size: 9px;
        font-weight: 900;
        color: #000000;
        text-transform: uppercase;
    }

    @keyframes fluid-spin {
        0% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(180deg) scale(1.08); }
        100% { transform: rotate(360deg) scale(1); }
    }
    @keyframes fluid-spin-r {
        0% { transform: rotate(360deg) scale(1.05); }
        50% { transform: rotate(180deg) scale(0.95); }
        100% { transform: rotate(0deg) scale(1.05); }
    }
    @keyframes bub {
        0% { opacity: 0; transform: translateY(0) scale(0.3); }
        15% { opacity: 0.5; }
        100% { opacity: 0; transform: translateY(-30px) translateX(5px) scale(1); }
    }
    @keyframes reply-spin {
        to { transform: rotate(360deg); }
    }
    @keyframes squish {
        0% { transform: scale(1, 1); }
        25% { transform: scale(1.15, 0.85); }
        50% { transform: scale(0.9, 1.1); }
        75% { transform: scale(1.05, 0.95); }
        100% { transform: scale(1, 1); }
    }
    /* ===== Codex-style cow-cat appearance ===== */
    .pet-wrapper {
        width: 104px;
        height: 82px;
        image-rendering: pixelated;
        transform-origin: 50% 72%;
    }
    .pet-wrapper::before {
        content: '';
        position: absolute;
        width: 30px;
        height: 14px;
        right: 6px;
        top: 44px;
        background: #ffffff;
        border: 3px solid #1a1a1a;
        border-left: 0;
        border-radius: 0 12px 12px 0;
        box-shadow: inset -12px 0 0 #1d1d1d;
        transform-origin: left center;
        animation: cow-tail 2.2s steps(3) infinite;
        z-index: 0;
    }
    .pet-wrapper::after {
        content: '';
        position: absolute;
        left: 28px;
        bottom: 1px;
        width: 12px;
        height: 8px;
        background: #1a1a1a;
        box-shadow: 20px 0 0 #1a1a1a;
        border-radius: 2px;
        z-index: 4;
    }
    .inner-fluid {
        top: 13px;
        left: 10px;
        right: 24px;
        bottom: 8px;
        border-radius: 18px 20px 16px 16px;
        overflow: visible;
        background: #ffffff;
        border: 3px solid #1a1a1a;
        box-shadow: inset -4px -4px 0 rgba(0,0,0,0.08), 0 3px 0 rgba(0,0,0,0.18);
        z-index: 2;
    }
    .fluid-blob {
        width: 25px;
        height: 21px;
        top: 8px;
        left: 3px;
        border-radius: 8px 10px 6px 9px;
        background: #1b1b1b;
        animation: cow-spot 2.8s steps(2) infinite;
    }
    .fluid-blob-2 {
        width: 20px;
        height: 18px;
        top: 28px;
        left: 41px;
        border-radius: 8px 5px 9px 5px;
        background: #202020;
        animation: none;
    }
    .glass-shell {
        top: 6px;
        left: 18px;
        width: 48px;
        height: 42px;
        border-radius: 16px 16px 14px 14px;
        background: #ffffff;
        border: 3px solid #1a1a1a;
        box-shadow: inset -3px -3px 0 rgba(0,0,0,0.08);
        z-index: 3;
    }
    .glass-shell::before,
    .glass-shell::after {
        content: '';
        position: absolute;
        top: -12px;
        width: 17px;
        height: 17px;
        background: #ffffff;
        border: 3px solid #1a1a1a;
        filter: none;
        border-radius: 4px 10px 4px 10px;
        transform: rotate(45deg);
    }
    .glass-shell::before { left: 3px; box-shadow: inset 4px 4px 0 #202020; }
    .glass-shell::after { right: 3px; box-shadow: inset -4px -4px 0 #202020; }
    .eyes-container {
        top: 20px;
        left: 23px;
        width: 39px;
        height: 18px;
        gap: 13px;
        z-index: 5;
    }
    .eye {
        width: 5px;
        height: 15px;
        border-radius: 1px;
        background: #dff8ff;
        border: 2px solid #111;
        box-shadow: inset 0 3px 0 #ffffff, 0 0 5px rgba(160,236,255,0.75);
    }
    .blush {
        top: 41px;
        width: 7px;
        height: 5px;
        background: #f0a7a2;
        filter: none;
        opacity: 0.7;
        border-radius: 2px;
        z-index: 5;
    }
    .blush-l { left: 25px; }
    .blush-r { right: 25px; }
    .pet-wrapper:not(.custom-image) .blush { display: none; }
    .bub { display: none; }
    .custom-pet-image {
        display: none;
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        image-rendering: pixelated;
        z-index: 4;
        pointer-events: none;
    }
    .custom-pet-sheet,
    .custom-pet-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        max-width: none;
        max-height: none;
        object-fit: fill;
        image-rendering: pixelated;

const eyeL = document.getElementById('eyeL');

const skillBookPanel = document.getElementById('skillBookPanel');
const focusTaskTitle = document.getElementById('focusTaskTitle');
const focusIntentType = document.getElementById('focusIntentType');
const focusSummary = document.getElementById('focusSummary');

const focusRewardText = document.getElementById('focusRewardText');
const focusStartButton = document.getElementById('focusStartButton');
const focusFinishButton = document.getElementById('focusFinishButton');
const petLevelText = document.getElementById('petLevelText');
const abilityList = document.getElementById('abilityList');
const skillCardList = document.getElementById('skillCardList');
const replyBubble = document.getElementById('replyBubble');
const replyBubbleSender = document.getElementById('replyBubbleSender');
const replyBubbleText = document.getElementById('replyBubbleText');
const replyBubbleToggle = document.getElementById('replyBubbleToggle');
const replyDockButton = document.getElementById('replyDockButton');
const conversationPanel = document.getElementById('conversationPanel');
const conversationList = document.getElementById('conversationList');

let voiceOn = true;
let isConnected = false;
let activeAppearance = { mode: 'cow-cat', activePetId: 'cow-cat', customPets: [] };
let activePetManifest = null;
let selectedFocusDuration = 25;
let petProgressState = null;
let activeFocusSession = null;
let focusTimerInterval = null;
let spriteFrameTimer = null;
let spriteFrameIndex = 0;
let spriteReactionTimer = null;
let customPetFrameImage = new Image();
let customPetFrameReady = false;
let customPetFrameSrc = '';
let petFacing = 1;
let roamDirection = Math.random() < 0.5 ? -1 : 1;
let roamPausedUntil = Date.now() + 4000;
let roamInFlight = false;
let replyBubbleTimer = null;
let replyBubbleFullContent = '';
let replyBubblePreviewContent = '';
let currentConversationTitle = '';
let replyBubbleCollapsed = false;
let replyDockState = '';
let conversationModeActive = false;
let awaitingConversationReply = false;
let conversationMode = 'basic';

function hideGamePanels() {
    [focusAdventurePanel, abilityTreePanel, skillBookPanel].forEach(panel => panel?.classList.remove('show'));
}

function hideInboxTray() {
    inboxTray?.classList.remove('show');
}

function hasReplyConversation() {
    return Boolean(currentConversationTitle || replyBubbleFullContent || awaitingConversationReply);
}

function setDockState(state = '') {
    replyDockState = state;
    if (!replyDockButton) return;
    const showDock = replyBubbleCollapsed && hasReplyConversation();
    replyDockButton.classList.toggle('show', showDock);
    replyDockButton.classList.toggle('pending', state === 'pending');
    replyDockButton.classList.toggle('ready', state === 'ready');
    replyDockButton.title = state === 'pending' ? '正在回复，点击展开' : '查看回复';
}

function closeReplyBubble() {
    if (replyBubbleTimer) clearTimeout(replyBubbleTimer);
    replyBubbleTimer = null;
    replyBubble?.classList.remove('show', 'expanded', 'has-more', 'pending', 'ready');
    if (replyBubbleToggle) replyBubbleToggle.textContent = '展开';
    setDockState(replyDockState);
}

function clearReplyConversation() {
    closeReplyBubble();
    replyBubbleFullContent = '';
    replyBubblePreviewContent = '';
    currentConversationTitle = '';
    replyBubbleCollapsed = false;
    setDockState('');
}

function endConversationMode() {
    conversationModeActive = false;
    inputBar.classList.remove('show');
    hideConversationPanel();
    closeReplyBubble();
}

function showGamePanel(panel) {

function getCustomPetFrameGeometry(action, frame) {
    const columns = activePetManifest?.layout?.columns || 8;
    const rows = activePetManifest?.layout?.rows || Object.keys(activePetManifest?.states || {}).length || 9;
    const state = activePetManifest?.states?.[action] || activePetManifest?.states?.idle || {};
    const sourceCellWidth = Math.max(1, Math.floor((customPetFrameImage.naturalWidth || customPetFrameImage.width) / columns));
    const sourceCellHeight = Math.max(1, Math.floor((customPetFrameImage.naturalHeight || customPetFrameImage.height) / rows));
    const frames = Math.max(1, Math.min(state.frames || 1, columns));
    const row = typeof state.row === 'number' ? state.row : 0;
    return {
        sourceCellWidth,
        sourceCellHeight,
        sourceX: (frame % frames) * sourceCellWidth,
        sourceY: row * sourceCellHeight,
        frames,
    };
}

function clampFrameOffset(offset, min, max, size) {
    return Math.max(-min, Math.min(size - 1 - max, offset));
}

function calculateFrameCoreOffset(frameData, width, height) {
    let minX = Infinity;
    let minY = Infinity;
    let maxX = -Infinity;
    let maxY = -Infinity;
    let opaqueCount = 0;
    for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
            const alpha = frameData.data[(y * width + x) * 4 + 3];
            if (alpha <= 40) continue;
            minX = Math.min(minX, x);
            minY = Math.min(minY, y);
            maxX = Math.max(maxX, x);
            maxY = Math.max(maxY, y);
            opaqueCount += 1;
        }
    }
    if (!Number.isFinite(minX)) return { dx: 0, dy: 0 };

    const contentHeight = maxY - minY + 1;
    const coreMaxY = minY + Math.max(2, Math.floor(contentHeight * 0.38));
    let coreMinX = Infinity;
    let coreMaxX = -Infinity;
    let coreSamples = 0;
    for (let y = minY; y <= coreMaxY; y += 1) {
        for (let x = minX; x <= maxX; x += 1) {
            const alpha = frameData.data[(y * width + x) * 4 + 3];
            if (alpha <= 40) continue;
            coreMinX = Math.min(coreMinX, x);
            coreMaxX = Math.max(coreMaxX, x);
            coreSamples += 1;
        }
    }

    const coreAnchorX = coreSamples >= Math.max(4, Math.floor(opaqueCount * 0.08))
        ? (coreMinX + coreMaxX) / 2
        : (minX + maxX) / 2;
    const centerY = (minY + maxY) / 2;
    return {
        dx: clampFrameOffset(Math.round((width - 1) / 2 - coreAnchorX), minX, maxX, width),
        dy: clampFrameOffset(Math.round((height - 1) / 2 - centerY), minY, maxY, height),
    };
}

function drawCustomPetFrame(action, frame) {
    if (!customPetFrameReady || !activePetManifest) return { frames: 1 };
    const geometry = getCustomPetFrameGeometry(action, frame);
    const context = customPetCanvas.getContext('2d', { willReadFrequently: true });
    customPetCanvas.width = geometry.sourceCellWidth;
    customPetCanvas.height = geometry.sourceCellHeight;
    context.imageSmoothingEnabled = false;
    context.clearRect(0, 0, customPetCanvas.width, customPetCanvas.height);
    context.drawImage(
        customPetFrameImage,
        geometry.sourceX,
        geometry.sourceY,
        geometry.sourceCellWidth,
        geometry.sourceCellHeight,
        0,
        0,
        geometry.sourceCellWidth,
        geometry.sourceCellHeight
    );

    const frameData = context.getImageData(0, 0, customPetCanvas.width, customPetCanvas.height);
    const { dx, dy } = calculateFrameCoreOffset(frameData, customPetCanvas.width, customPetCanvas.height);
    if (dx !== 0 || dy !== 0) {
        context.clearRect(0, 0, customPetCanvas.width, customPetCanvas.height);
        context.drawImage(
            customPetFrameImage,
            geometry.sourceX,
            geometry.sourceY,
            geometry.sourceCellWidth,
            geometry.sourceCellHeight,
            dx,
            dy,
            geometry.sourceCellWidth,
            geometry.sourceCellHeight
        );
    }
    return geometry;
}

    if (roamInFlight) return;

        if (currentMood === 'walking') setMood('idle');
        return;
    }
    roamInFlight = true;
    petFacing = roamDirection > 0 ? 1 : -1;
    if (currentMood !== 'walking') setMood('walking');
    try {
        const result = await electronAPI.invoke('roam-pet', { dx: roamDirection * 5, dy: 0 });
        if (result?.hitX || Math.random() < 0.015) {
            roamDirection *= -1;
            petFacing = roamDirection > 0 ? 1 : -1;
            roamPausedUntil = Date.now() + 350 + Math.random() * 900;

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
    })[char]);
}

function renderMarkdownInline(value) {
    const codeTokens = [];
    let text = escapeHtml(value).replace(/`([^`]+)`/g, (_, code) => {
        const token = `@@CODE${codeTokens.length}@@`;
        codeTokens.push(`<code>${code}</code>`);
        return token;
    });

    text = text
        .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+|mailto:[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>')
        .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
        .replace(/(^|[\s(])_([^_\n]+)_/g, '$1<em>$2</em>');

    return text.replace(/@@CODE(\d+)@@/g, (_, index) => codeTokens[Number(index)] || '');
}

function renderMarkdown(value) {
    const text = String(value || '').trim();
    if (!text) return '';

    const lines = text.replace(/\r\n/g, '\n').split('\n');
    let html = '';
    let listType = '';
    let inCodeBlock = false;
    let codeLines = [];
    let paragraphLines = [];

    const flushParagraph = () => {
        if (!paragraphLines.length) return;
        html += `<p>${renderMarkdownInline(paragraphLines.join(' '))}</p>`;
        paragraphLines = [];
    };
    const closeList = () => {
        if (!listType) return;
        html += `</${listType}>`;
        listType = '';
    };
    const openList = (type) => {
        if (listType === type) return;
        closeList();
        listType = type;
        html += `<${type}>`;
    };
    const flushCodeBlock = () => {
        html += `<pre><code>${escapeHtml(codeLines.join('\n'))}</code></pre>`;
        codeLines = [];
    };

    for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed.startsWith('```')) {
            if (inCodeBlock) {
                flushCodeBlock();
                inCodeBlock = false;
            } else {
                flushParagraph();
                closeList();
                inCodeBlock = true;
                codeLines = [];
            }
            continue;
        }
        if (inCodeBlock) {
            codeLines.push(line);
            continue;
        }
        if (!trimmed) {
            flushParagraph();
            closeList();
            continue;
        }

        const heading = trimmed.match(/^#{1,6}\s+(.+)$/);
        if (heading) {
            flushParagraph();
            closeList();
            html += `<p><strong>${renderMarkdownInline(heading[1])}</strong></p>`;
            continue;
        }

        const bullet = trimmed.match(/^[-*+]\s+(.+)$/);
        if (bullet) {
            flushParagraph();
            openList('ul');
            html += `<li>${renderMarkdownInline(bullet[1])}</li>`;
            continue;
        }

        const numbered = trimmed.match(/^\d+[.)]\s+(.+)$/);
        if (numbered) {
            flushParagraph();
            openList('ol');
            html += `<li>${renderMarkdownInline(numbered[1])}</li>`;
            continue;
        }

        closeList();
        paragraphLines.push(trimmed);
    }

    if (inCodeBlock) flushCodeBlock();
    flushParagraph();
    closeList();

    return html;
}

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function waitForOpenClawGateway({ attempts = 1, delayMs = 0 } = {}) {
    for (let attempt = 0; attempt < attempts; attempt += 1) {
        try {
            const gatewaySnapshot = await electronAPI.invoke('gateway-status');
            const availability = gatewaySnapshot?.availability;
            if (availability && !availability.ready) {
                return { ready: false, blocked: true, reason: availability.reason };
            }
            isConnected = Boolean(gatewaySnapshot?.connected);
            if (isConnected) return { ready: true };
        } catch (_) {
            isConnected = false;
        }
        if (delayMs > 0 && attempt < attempts - 1) await sleep(delayMs);
    }
    return { ready: false };
}

async function ensureOpenClawReady() {
    if (conversationMode !== 'openclaw') return true;
    const initialGateway = await waitForOpenClawGateway({ attempts: 1 });
    if (initialGateway.ready) return true;
    if (initialGateway.blocked) {
        setConversationStatus(initialGateway.reason || 'OpenClaw Gateway is offline.', 'error');
        return false;
    }

    setConversationStatus('OpenClaw Gateway is offline. Restarting...', 'error');
    try {
        const restart = await electronAPI.invoke('diag-restart-gateway');
        if (!restart?.success) {
            setConversationStatus(restart?.error || restart?.message || 'OpenClaw Gateway is offline.', 'error');
            return false;
        }

        const ready = await waitForOpenClawGateway({ attempts: 6, delayMs: 900 });
        if (ready.ready) {
            setConversationStatus('OpenClaw Gateway reconnected.', '');
            return true;
        }
        if (ready.blocked) {
            setConversationStatus(ready.reason || 'OpenClaw Gateway is offline.', 'error');
            return false;
        }
        setConversationStatus('OpenClaw Gateway is offline. Use tray > Restart Gateway.', 'error');
        return false;
    } catch (err) {
        setConversationStatus(err?.message || 'OpenClaw Gateway is offline.', 'error');
        return false;
    }
}

function showReplyBubble(response = {}) {
    if (!replyBubble || !replyBubbleText) return;
    const content = String(response.content || response.text || '').trim();
    if (!content) return;
    const previewLimit = 110;
    const hasMore = content.length > previewLimit;
    hideConversationPanel();
    currentConversationTitle = String(response.title || currentConversationTitle || response.sender || '小K').trim();
    if (replyBubbleSender) replyBubbleSender.textContent = currentConversationTitle;
    replyBubbleFullContent = content;
    replyBubblePreviewContent = hasMore ? `${content.slice(0, previewLimit - 3)}...` : content;
    setDockState('ready');
    if (replyBubbleCollapsed) return;
    setReplyBubbleContent(replyBubblePreviewContent);
    replyBubble.classList.remove('expanded', 'pending');
    replyBubble.classList.add('ready');
    replyBubble.classList.toggle('has-more', hasMore);
    if (replyBubbleToggle) replyBubbleToggle.textContent = '展开';
    setConversationStatus('', '');
    replyBubble.classList.add('show');
    if (replyBubbleTimer) clearTimeout(replyBubbleTimer);
    replyBubbleTimer = setTimeout(() => {
        collapseReplyBubble();
        if (!inputBar.classList.contains('show') && !conversationPanel.classList.contains('show')) {
            conversationModeActive = false;
        }
    }, 12000);
}

function showPendingReplyBubble(title) {
    currentConversationTitle = String(title || '正在回复').trim();

    replyBubblePreviewContent = replyBubbleFullContent;
    replyBubbleCollapsed = false;
    if (replyBubbleSender) replyBubbleSender.textContent = currentConversationTitle;
    setReplyBubbleContent(replyBubblePreviewContent);
    replyBubble?.classList.remove('expanded', 'has-more', 'ready');
    replyBubble?.classList.add('show', 'pending');
    if (replyBubbleToggle) replyBubbleToggle.textContent = '展开';
    setDockState('pending');
    if (replyBubbleTimer) clearTimeout(replyBubbleTimer);
    replyBubbleTimer = null;
}

function collapseReplyBubble() {
    if (!hasReplyConversation()) return;
    replyBubbleCollapsed = true;
    closeReplyBubble();
    setDockState(awaitingConversationReply ? 'pending' : 'ready');
}

function restoreCollapsedReplyBubble() {
    if (!hasReplyConversation()) return;
    replyBubbleCollapsed = false;
    setDockState(replyDockState);
    if (awaitingConversationReply && !replyBubbleFullContent) {
        showPendingReplyBubble(currentConversationTitle);
        return;
    }
    if (awaitingConversationReply && replyBubbleFullContent === '正在思考') {
        showPendingReplyBubble(currentConversationTitle);
        return;
    }
    showReplyBubble({
        title: currentConversationTitle,
        content: replyBubbleFullContent || replyBubblePreviewContent || '正在思考',
    });
}

function continueConversation() {

function toggleReplyBubbleExpanded() {
    if (!replyBubble || !replyBubbleText || !replyBubbleFullContent) return;
    const expanded = !replyBubble.classList.contains('expanded');
    replyBubble.classList.toggle('expanded', expanded);
    setReplyBubbleContent(expanded ? replyBubbleFullContent : replyBubblePreviewContent);
    if (replyBubbleToggle) {
        if (expanded) {
            replyBubbleToggle.textContent = '收起';
        } else {
            replyBubbleToggle.textContent = '展开';
        }
    }
    if (replyBubbleTimer) clearTimeout(replyBubbleTimer);

        closeReplyBubble();

    }, expanded ? 24000 : 12000);
}

}

function playAffinityReaction(reaction) {
    if (!reaction || reaction === 'idle') return;
    if (reaction === 'surprised') {
        setMood('surprised');
        setTimeout(() => setMood('happy'), 900);
        setTimeout(() => setMood('idle'), 2200);
        return;
    }
    if (reaction === 'thinking') {

                : `<div>${escapeHtml(status === 'learned' ? 'Learned' : status)}</div>`;

function getInboxState(payload = {}) {
    return payload.state || payload;
}

function setInboxStatus(message = '', isError = false) {
    if (!inboxStatus) return;
    inboxStatus.textContent = message;
    inboxStatus.classList.toggle('error', Boolean(isError));
}

function formatInboxSize(bytes = 0) {
    const size = Number(bytes) || 0;
    if (size >= 1024 * 1024) return `${(size / 1024 / 1024).toFixed(1)} MB`;
    if (size >= 1024) return `${Math.ceil(size / 1024)} KB`;
    return `${size} B`;
}

function renderInboxState(payload = {}) {
    if (!inboxList) return;
    const state = getInboxState(payload);
    const records = Array.isArray(state.records) ? state.records : [];
    if (!records.length) {
        inboxList.innerHTML = '<div class="inbox-empty">No files yet.</div>';
        return;
    }

    inboxList.innerHTML = records.map(record => {
        const meta = [
            record.type || 'other',
            formatInboxSize(record.size),
            record.source || 'manual'
        ].filter(Boolean).join(' | ');
        return `
            <div class="inbox-record ${record.missing ? 'missing' : ''}" draggable="${record.missing ? 'false' : 'true'}" data-inbox-id="${escapeHtml(record.id)}" ondragstart="startInboxDrag(event, '${escapeHtml(record.id)}')">
                <div class="inbox-record-name">${escapeHtml(record.name || 'Inbox item')}</div>
                <div class="inbox-record-meta">${escapeHtml(meta)}${record.missing ? ' | Missing' : ''}</div>
                <div class="inbox-record-actions">
                    <button onclick="openInboxItem('${escapeHtml(record.id)}')">Open</button>
                    <button onclick="revealInboxItem('${escapeHtml(record.id)}')">Show</button>
                    <button onclick="removeInboxRecord('${escapeHtml(record.id)}')">Clear</button>
                </div>
            </div>
        `;
    }).join('');
}

function getDropFilePaths(event) {
    return Array.from(event.dataTransfer?.files || [])
        .map(file => file.path)

}

async function collectDroppedInboxFiles(event) {
    event.preventDefault();
    event.stopPropagation();
    inboxDropZone?.classList.remove('drag-over');
    pet?.classList.remove('inbox-drag-over');
    const filePaths = getDropFilePaths(event);
    if (!filePaths.length || !window.electronAPI) {
        setInboxStatus('Drop files from your desktop.', true);
        return;
    }
    const result = await electronAPI.invoke('inbox-add-files', { source: 'drop', filePaths });
    renderInboxState(result);
    setInboxStatus(result.success ? `Added ${result.records?.length || 0} file(s).` : (result.error || 'Drop failed.'), !result.success);
}

function bindInboxDragTargets() {
    const targets = [inboxDropZone, pet].filter(Boolean);
    targets.forEach(target => {
        target.addEventListener('dragenter', event => {
            event.preventDefault();
            if (target === inboxDropZone) inboxDropZone.classList.add('drag-over');
            if (target === pet) pet.classList.add('inbox-drag-over');
        });
        target.addEventListener('dragover', event => {
            event.preventDefault();
        });
        target.addEventListener('dragleave', () => {
            if (target === inboxDropZone) inboxDropZone.classList.remove('drag-over');
            if (target === pet) pet.classList.remove('inbox-drag-over');
        });
        target.addEventListener('drop', collectDroppedInboxFiles);
    });
}

function pixelizeImage(dataUrl) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
            const small = document.createElement('canvas');
            const size = 44;
            small.width = size;
            small.height = size;
            const sctx = small.getContext('2d');
            sctx.imageSmoothingEnabled = true;
            sctx.clearRect(0, 0, size, size);
            const scale = Math.min(size / img.width, size / img.height);
            const w = img.width * scale;
            const h = img.height * scale;
            sctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);

            const out = document.createElement('canvas');
            out.width = 172;
            out.height = 164;
            const ctx = out.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            ctx.clearRect(0, 0, out.width, out.height);
            ctx.drawImage(small, 0, 0, size, size, 0, 0, out.width, out.height);
            resolve(out.toDataURL('image/png'));
        };
        img.onerror = () => reject(new Error('Unable to read selected image'));
        img.src = dataUrl;
    });
}

// ===== 60fps 动画 =====
let t = 0, squishing = false, targetScale = 1, curScale = 1, breathExtra = 0;

// 有机运动参数
let deepBreathPhase = 0;       // 深呼吸相位（0=正常，>0=正在深呼吸）
let fidgetSeed = Math.random() * 100;  // 微动作种子
let lastInteraction = Date.now();      // 上次互动时间

function loop() {
    t += 0.016;
    curScale += (targetScale - curScale) * 0.08;

    // === 多频叠加有机浮动（替代单一正弦波）===
    const floatY = Math.sin(t * 1.3) * 3.5
                 + Math.sin(t * 0.67) * 2
                 + Math.sin(t * 2.3) * 0.6;
    const floatR = Math.sin(t * 0.9) * 0.3
                 + Math.sin(t * 0.37) * 0.2;

    // === 呼吸：基础 + 偶尔深呼吸 ===
    let breathScale = 1 + Math.sin(t * 2) * 0.01
                        + Math.sin(t * 0.8) * 0.005;
    if (deepBreathPhase > 0) {
        // 深呼吸：吸气膨胀 → 呼气收缩
        breathScale += Math.sin(deepBreathPhase) * 0.025;
        deepBreathPhase += 0.04;
        if (deepBreathPhase > Math.PI) deepBreathPhase = 0;
    }

    // === 微动作：细微的重心移动 ===
    const fidgetX = Math.sin(t * 0.23 + fidgetSeed) * 0.6;
    const fidgetR = Math.sin(t * 0.17 + fidgetSeed * 2) * 0.12;

    const bounce = breathExtra > 0 ? Math.sin(t * 12) * breathExtra : 0;

    if (!squishing) {
        pet.style.transform = `translateX(${fidgetX}px) translateY(${floatY + bounce}px) rotate(${floatR + fidgetR}deg) scaleX(${petFacing}) scale(${curScale * breathScale})`;
    }
    requestAnimationFrame(loop);
}

// 过渡速度预设
const EYE_SPEED = {
    snap:   '0s',                  // 瞬切（用于眨眼闭合瞬间）
    fast:   '0.08s',               // 快速（眨眼睁开）
    normal: '0.18s',               // 常规
    smooth: '0.3s',                // 平滑（情绪过渡）
    slow:   '0.45s',               // 慢（白日梦、发呆）
    drift:  '0.6s',                // 极慢（眼神缓慢飘移）
};

function _setEyeTransition(speed) {
    const dur = EYE_SPEED[speed] || speed || EYE_SPEED.normal;
    const ease = speed === 'snap' || speed === 'fast'
        ? 'linear'
        : speed === 'slow' || speed === 'drift'
            ? 'cubic-bezier(0.4, 0, 0.2, 1)'
            : 'cubic-bezier(0.25, 1, 0.5, 1)';
    const t = `width ${dur} ${ease}, height ${dur} ${ease}, border-radius ${dur} ${ease}, transform ${dur} ${ease}`;
    eyeL.style.transition = t;
    eyeR.style.transition = t;
}

function setEyes(L, R, speed) {
    if (speed) _setEyeTransition(speed);
    const d = { w:11, h:19, br:'6px', tx:0, ty:0, sx:1, sy:1, rot:0 };
    const l = { ...d, ...L };
    const r = R ? { ...d, ...R } : { ...l };
    eyeL.style.width = l.w+'px'; eyeL.style.height = l.h+'px'; eyeL.style.borderRadius = l.br;
    eyeL.style.transform = `translate(${l.tx}px,${l.ty}px) scale(${l.sx},${l.sy}) rotate(${l.rot}deg)`;
    eyeR.style.width = r.w+'px'; eyeR.style.height = r.h+'px'; eyeR.style.borderRadius = r.br;
    eyeR.style.transform = `translate(${r.tx}px,${r.ty}px) scale(${r.sx},${r.sy}) rotate(${r.rot}deg)`;
    // 用完后恢复默认速度
    if (speed) setTimeout(() => _setEyeTransition('normal'), 20);
}

// ===== 鼠标跟随 =====
let mouseTracking = true;
document.addEventListener('mousemove', (e) => {
    if (!mouseTracking) return;
    const rect = pet.getBoundingClientRect();
    const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
    const dx = Math.max(-2, Math.min(2, (e.clientX - cx) / window.innerWidth * 6));
    const dy = Math.max(-2, Math.min(2, (e.clientY - cy) / window.innerHeight * 6));
    eyeL.style.transform = `translate(${dx}px,${dy}px)`;
    eyeR.style.transform = `translate(${dx}px,${dy}px)`;
});

// ===== 眨眼（自然节奏）=====
function doBlink() {
    if (currentMood === 'sleepy' || currentMood === 'happy') { schedBlink(); return; }
    mouseTracking = false;
    EXPR.blink();
    const r = Math.random();
    if (r < 0.15) {
        // 15% 连眨两下
        setTimeout(() => {
            EXPR.normal(); setTimeout(() => {
                EXPR.blink(); setTimeout(() => { applyMoodEyes(); mouseTracking = true; }, 70);
            }, 100);
        }, 70);
    } else if (r < 0.3) {
        // 15% 半眨 → 全眨
        setTimeout(() => {
            EXPR.halfBlink();
            setTimeout(() => { EXPR.blink(); setTimeout(() => { applyMoodEyes(); mouseTracking = true; }, 80); }, 120);
        }, 70 + Math.random() * 40);
    } else if (r < 0.4) {
        // 10% 慢眨（像在走神）
        setTimeout(() => {
            EXPR.halfBlink();
            setTimeout(() => { applyMoodEyes(); mouseTracking = true; }, 250 + Math.random() * 150);
        }, 120);
    } else {
        // 50% 正常快速眨
        setTimeout(() => { applyMoodEyes(); mouseTracking = true; }, 70 + Math.random() * 30);
    }
    schedBlink();
}
function schedBlink() {
    // 不均匀间隔：偶尔快速连眨，偶尔长时间不眨
    const base = Math.random() < 0.2 ? 800 + Math.random() * 1500 : 2500 + Math.random() * 5000;
    setTimeout(doBlink, base);
}
schedBlink();

let isDrag = false, startX, startY, dragOffsetX, dragOffsetY, clickCount = 0, clickTimer = null;

    isDrag = false; 
    startX = e.screenX; 
    startY = e.screenY;

    dragOffsetX = e.clientX;

function spawnParticles() {
    const colors = ['#ff6b6b','#ffa07a','#ffb347','#ff69b4','#fff','#ffd700'];
    for (let i = 0; i < 8; i++) {
        const p = document.createElement('div');
        const sz = 2 + Math.random() * 3;
        const a = (Math.PI * 2 / 8) * i + Math.random() * 0.4;
        const dist = 15 + Math.random() * 25;
        p.style.cssText = `position:absolute;border-radius:50%;pointer-events:none;
            width:${sz}px;height:${sz}px;
            background:${colors[Math.floor(Math.random()*colors.length)]};
            left:50%;top:50%;opacity:1;
            transition:transform 0.4s ease-out,opacity 0.4s ease-out;`;
        particlesEl.appendChild(p);
        requestAnimationFrame(() => {
            p.style.transform = `translate(${Math.cos(a)*dist}px,${Math.sin(a)*dist}px)`;
            p.style.opacity = '0';
        });
        setTimeout(() => p.remove(), 450);
    }
}

let currentMood = 'idle', talkInterval = null;

function applyMoodEyes() {
    const m = MOODS[currentMood];
    if (m && EXPR[m.eyes]) EXPR[m.eyes]();
}

function setMood(mood) {
    const map = { normal:'idle', busy:'talking', excited:'happy' };
    mood = map[mood] || mood;
    if (!MOODS[mood]) mood = 'idle';
    const m = MOODS[mood];
    pet.className = pet.className
        .split(/\s+/)
        .filter(c => c && !c.startsWith('mood-'))
        .concat('mood-' + mood)
        .join(' ');

    // 任何情绪变化都算互动
    lastInteraction = Date.now();

    if (mood !== currentMood) {
        // 打断上一次未完成的过渡
        if (_moodTimer) { clearTimeout(_moodTimer); _moodTimer = null; }

        // filter 柔光过渡：亮起 → 换色 → 淡出，遮掩 gradient 跳变
        fluid.style.transition = 'filter 0.35s ease-in';
        fluid.style.filter = 'brightness(1.6) blur(2px)';

        _moodTimer = setTimeout(() => {
            // 峰值时瞬间换色（人眼在高亮度下感知不到跳变）
            if (pet.classList.contains('custom-image')) {
                fluid.style.background = m.fluid;
                blob1.style.background = m.b1;
                blob2.style.background = m.b2;
            }
            // 🔮 应用情绪发光效果
            if (m.glow && glassShell) {
                glassShell.style.boxShadow = 'inset -2px -2px 8px rgba(255,255,255,0.08), inset 2px 2px 8px rgba(255,255,255,0.35), ' + m.glow;
            }
            blob1.style.animation = 'fluid-spin ' + m.speed + ' linear infinite';

            // 淡出回正常
            fluid.style.transition = 'filter 0.5s ease-out';
            fluid.style.filter = 'brightness(1) blur(0px)';

            _moodTimer = setTimeout(() => {
                fluid.style.transition = '';
                fluid.style.filter = '';
                _moodTimer = null;
            }, 550);
        }, 350);
    }

    currentMood = mood;
    blob1.style.animationDuration = m.speed;

    if (mood === 'sleepy' || mood === 'sad') {
        blob1.style.transition = 'opacity 1.5s ease';
        blob1.style.opacity = '0.6';
    } else {
        blob1.style.transition = 'opacity 1.0s ease';
        blob1.style.opacity = '1';
    }

    targetScale = m.scale; breathExtra = m.bounce;
    mouseTracking = (mood !== 'sleepy' && mood !== 'happy' && mood !== 'sad');
    if (talkInterval) { clearInterval(talkInterval); talkInterval = null; }
    if (mood === 'talking') {
        let tog = false;
        talkInterval = setInterval(() => { tog=!tog; tog ? EXPR.talkBig() : EXPR.talking(); }, 250);
    } else { applyMoodEyes(); }
    startSpriteAnimation();

    if (mood === 'happy' || mood === 'excited' || mood === 'love') {
        blushL.style.transition = 'background 0.8s ease, opacity 0.6s ease';
        blushR.style.transition = 'background 0.8s ease, opacity 0.6s ease';
        blushL.style.background = mood === 'love' ? 'rgba(255,90,120,0.5)' : 'rgba(255,120,120,0.4)';
        blushR.style.background = mood === 'love' ? 'rgba(255,90,120,0.5)' : 'rgba(255,120,120,0.4)';
    } else {
        blushL.style.transition = 'background 0.6s ease, opacity 0.4s ease';
        blushR.style.transition = 'background 0.6s ease, opacity 0.4s ease';
        blushL.style.background = '';
        blushR.style.background = '';
    }
}

// 时间场景判定
function getTimeScene() {
    const h = new Date().getHours();
    if (h >= 6 && h < 11)  return 'morning';
    if (h >= 11 && h < 14) return 'noon';
    if (h >= 14 && h < 18) return 'afternoon';
    if (h >= 18 && h < 22) return 'evening';
    return 'latenight';
}

// 语气状态（从 AI 回复文本中提取）
let lastTone = 'neutral';
function detectTone(text) {
    if (!text) return 'neutral';
    if (/哈哈|嘻嘻|😄|😆|笑|开心|太好了|棒|厉害|不错|好耶/.test(text)) return 'cheerful';
    if (/害羞|脸红|嘿嘿|😳|😊|人家/.test(text)) return 'shy';
    if (/生气|可恶|气死|哼|😠|😤|讨厌/.test(text)) return 'annoyed';
    if (/难过|伤心|唉|😢|😭|呜呜|抱歉|对不起/.test(text)) return 'sad';
    if (/好奇|为什么|怎么|吗？|呢？|🤔|想想/.test(text)) return 'curious';
    if (/加油|冲|💪|努力|一定可以|相信/.test(text)) return 'encourage';
    if (/困|累|😴|哈欠|想睡|好困/.test(text)) return 'tired';
    if (/惊|天哪|什么|😱|😮|不会吧|哇/.test(text)) return 'surprised';
    if (/嗯|好的|了解|明白|知道了|收到/.test(text)) return 'calm';
    return 'neutral';
}

// 时间场景 → 偏好的动作池权重
const SCENE_WEIGHTS = {
    morning:   { sleepy: 4, daily: 3, dreamy: 2, shy: 1, thinking: 1 },
    noon:      { daily: 3, happy: 2, playful: 2, thinking: 1, sleepy: 1 },
    afternoon: { daily: 3, thinking: 2, happy: 1, dreamy: 1, playful: 1, encourage: 1 },
    evening:   { daily: 2, happy: 2, dreamy: 2, shy: 1, sleepy: 2 },
    latenight: { sleepy: 5, dreamy: 2, daily: 1, dizzy: 2, sad: 1 },
};

// 语气 → 偏好的动作池映射
const TONE_MAP = {
    cheerful: 'happy', shy: 'shy', annoyed: 'annoyed', sad: 'sad',
    curious: 'thinking', encourage: 'encourage', tired: 'sleepy',
    surprised: 'surprised', calm: 'dreamy', neutral: null,
};

// 智能选择动作
function pickIdleAction() {
    const scene = getTimeScene();
    const tonePool = TONE_MAP[lastTone];

    // 语气优先：最近有明确语气时 70% 概率按语气选
    if (tonePool && ACT[tonePool] && Math.random() < 0.7) {
        lastTone = 'neutral';
        const pool = ACT[tonePool];
        return pool[Math.floor(Math.random() * pool.length)];
    }

    // 否则按时间场景加权随机
    const weights = SCENE_WEIGHTS[scene] || SCENE_WEIGHTS.afternoon;
    const entries = [];
    for (const [cat, w] of Object.entries(weights)) {
        if (ACT[cat]) for (let i = 0; i < w; i++) entries.push(cat);
    }
    const cat = entries[Math.floor(Math.random() * entries.length)];
    const pool = ACT[cat];
    return pool[Math.floor(Math.random() * pool.length)];
}

setInterval(() => {
    if (currentMood !== 'idle' || !mouseTracking) return;

    const idleTime = (Date.now() - lastInteraction) / 1000; // 秒

    // === 无聊渐进系统 ===
    if (idleTime > 180 && Math.random() < 0.25) {
        // 3 分钟没互动：打哈欠 / 伸懒腰
        mouseTracking = false;
        const r = Math.random();
        if (r < 0.4) {
            // 打哈欠：嘴巴张大 → 眯眼 → 发呆
            EXPR.wow();
            const s = targetScale;
            targetScale = 1.06;
            setTimeout(() => { EXPR.sleepy(); targetScale = s; }, 800);
            setTimeout(() => { EXPR.drowsy(); }, 1500);
            setTimeout(() => { EXPR.normal(); mouseTracking = true; }, 2500);
        } else if (r < 0.7) {
            // 伸懒腰 → 抖一抖 → 精神
            const s = targetScale;
            EXPR.sleepy();
            targetScale = 1.1;
            setTimeout(() => { targetScale = 0.92; }, 600);
            setTimeout(() => { targetScale = 1.06; EXPR.surprised(); }, 900);
            setTimeout(() => { targetScale = s; EXPR.normal(); mouseTracking = true; }, 1400);
        } else {
            // 发呆 → 慢慢回神
            EXPR.drowsy();
            setTimeout(() => EXPR.halfBlink(), 1200);
            setTimeout(() => { EXPR.blink(); }, 2000);
            setTimeout(() => { EXPR.curious(); }, 2200);
            setTimeout(() => { EXPR.normal(); mouseTracking = true; }, 2800);
        }
        return;
    }

    if (idleTime > 60 && Math.random() < 0.3) {
        // 1 分钟没互动：更多张望 / 无聊行为
        mouseTracking = false;
        const r = Math.random();
        if (r < 0.3) {
            // 叹气：深呼吸 + 半眨眼
            deepBreathPhase = 0.01;
            EXPR.halfBlink();
            setTimeout(() => { EXPR.normal(); mouseTracking = true; }, 1500);
        } else if (r < 0.6) {
            // 左右张望，像在找事做
            EXPR.lookLeft();
            setTimeout(() => EXPR.lookUp(), 500);
            setTimeout(() => EXPR.lookRight(), 1000);
            setTimeout(() => { EXPR.hmm(); }, 1500);
            setTimeout(() => { EXPR.normal(); mouseTracking = true; }, 2200);
        } else {
            // 无聊歪头
            EXPR.hmm();
            const s = targetScale;
            targetScale = 0.97;
            setTimeout(() => { targetScale = s; EXPR.blink(); }, 1000);
            setTimeout(() => { EXPR.normal(); mouseTracking = true; }, 1300);
        }
        return;
    }

    // === 常规待机微表情（30% 触发率）===
    if (Math.random() < 0.3) {
        mouseTracking = false;
        pickIdleAction()();
        setTimeout(() => { mouseTracking = true; }, 1500);
    }
}, 4000);

    if (Math.random() < 0.35) {

        eyeL.style.transition = 'transform 0.8s ease';
        eyeR.style.transition = 'transform 0.8s ease';
        eyeL.style.transform = `translate(${dx}px,${dy}px)`;
        eyeR.style.transform = `translate(${dx}px,${dy}px)`;
        // 停留一会再飘回来
        setTimeout(() => {
            eyeL.style.transition = 'transform 1.2s ease';
            eyeR.style.transition = 'transform 1.2s ease';
            eyeL.style.transform = '';
            eyeR.style.transform = '';
            setTimeout(() => {
                eyeL.style.transition = '';
                eyeR.style.transition = '';
            }, 1200);
        }, 1500 + Math.random() * 2000);
    }
}, 5000);

// 记录互动时间
pet.addEventListener('mousedown', () => { lastInteraction = Date.now(); });
pet.addEventListener('click', () => { recordPetAffinity('pet-click'); });
document.addEventListener('keydown', () => { lastInteraction = Date.now(); });

// ===== 工具栏 =====
function toggleInput() {
    if (inputBar.classList.contains('show')) {
        endConversationMode();
        return;
    }
    hideInboxTray();
    enterConversationMode();
}

function toggleVoice() {
    voiceOn = !voiceOn;
    btnVoice.innerHTML = voiceOn
        ? '<svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>'
        : '<svg viewBox="0 0 24 24"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2c0 .76-.12 1.5-.35 2.18"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>';
    btnVoice.classList.toggle('active', voiceOn);
    if (settingsVoiceButton) settingsVoiceButton.textContent = voiceOn ? 'Voice On' : 'Voice Off';
    if (electronAPI) electronAPI.invoke('set-voice-enabled', voiceOn);
    setMood('happy');
    setTimeout(() => setMood('idle'), 1500);
}

// ===== 模型切换 (CC Switch风格) =====
const modelBadge = document.getElementById('modelBadge');
let currentModelColor = '#E8A838';

async function cycleModel() {
    if (!electronAPI) return;
    setMood('thinking');
    const raw = await electronAPI.invoke('model-next');
    const model = (raw && typeof raw === 'object' && ('success' in raw || 'model' in raw || 'error' in raw))
        ? (raw.success ? raw.model : null)
        : raw;
    if (model) {
        updateModelBadge(model);
        // 球体闪变动画
        flashModelSwitch(model.color);
        setMood('happy');
        setTimeout(() => setMood('idle'), 2000);
    } else {
        setMood('idle');
    }
}

async function openModelPanel() {
    if (!electronAPI) return;
    await electronAPI.invoke('model-open-settings');
    setAppearanceNote('Model panel opened.');
}

async function openPetStudio() {
    if (!electronAPI) return;
    await electronAPI.invoke('pet-studio-open');
    setAppearanceNote('Pet Studio opened.');
}

async function openPetGame(tab = 'focus') {
    if (!electronAPI) return;
    hideGamePanels();
    hideInboxTray();
    toolbar.classList.remove('show');
    settingsPanel.classList.remove('show');
    endConversationMode();
    await electronAPI.invoke('pet-game-open', { tab });
}

function selectFocusDuration(minutes) {
    selectedFocusDuration = minutes;
    document.querySelectorAll('#focusDurations button').forEach(button => {
        button.classList.toggle('active', Number(button.dataset.minutes) === minutes);
    });
}

function openFocusAdventure() {
    showGamePanel(focusAdventurePanel);
    selectFocusDuration(selectedFocusDuration);
    loadPetProgress();
}

function openAbilityTree() {
    showGamePanel(abilityTreePanel);
    loadPetProgress();
}

function openSkillBook() {
    showGamePanel(skillBookPanel);
    loadPetProgress();
}

async function startFocusAdventure() {
    if (!window.electronAPI) return;
    const result = await electronAPI.invoke('focus-adventure-start', {
        taskTitle: focusTaskTitle.value,
        plannedMinutes: selectedFocusDuration,
        intentType: focusIntentType.value
    });
    if (!result.success) {
        focusRewardText.textContent = result.error || 'Could not start adventure';
        renderPetProgress(result.progress);
        return;
    }
    activeFocusSession = result.activeFocusSession;
    renderPetProgress(result.progress);
    setMood('focused');
    focusRewardText.textContent = 'Adventure started.';
}

async function finishFocusAdventure(status) {
    if (!window.electronAPI) return;
    const result = await electronAPI.invoke('focus-adventure-finish', {
        status,
        summary: focusSummary.value.trim()
    });
    if (!result.success) {
        focusRewardText.textContent = result.error || 'Could not finish adventure';
        renderPetProgress(result.progress);
        return;
    }
    renderPetProgress(result.progress);
    setMood(status === 'interrupted' ? 'sleepy' : 'happy');
    setTimeout(() => setMood('idle'), 2500);
    if (focusSummary) focusSummary.value = '';
    const rewards = result.session.rewards;
    focusRewardText.textContent = `+${rewards.focusXp} XP, +${rewards.abilityFragments} fragments, +${rewards.stardust} stardust${rewards.skillSeed ? ', Skill Seed found' : ''}${formatAffinityEvents(result.affinityEvents)}`;
}

async function unlockPetAbility(abilityId) {
    if (!window.electronAPI) return;
    const result = await electronAPI.invoke('pet-ability-unlock', abilityId);
    renderPetProgress(result.progress);
    if (!result.success) {
        focusRewardText.textContent = result.error || 'Ability locked';
        return;
    }
    focusRewardText.textContent = 'Ability unlocked.';
    setMood('happy');
    setTimeout(() => setMood('idle'), 2000);
}

async function learnPetSkill(seedId) {
    if (!window.electronAPI) return;
    const result = await electronAPI.invoke('pet-skill-learn', { seedId });
    renderPetProgress(result.progress);
    if (!result.success) {
        focusRewardText.textContent = result.error || 'Could not learn Skill';
        return;
    }
    focusRewardText.textContent = 'Skill learned.';
    setMood('happy');
    setTimeout(() => setMood('idle'), 2000);
}

function updateModelBadge(model) {
    if (!modelBadge || !model) return;
    modelBadge.textContent = model.icon;
    modelBadge.style.color = '#111';
    currentModelColor = model.color;
}

function flashModelSwitch(color) {
    // 球体快速闪变效果
    const pet = document.getElementById('pet');
    pet.style.transition = 'filter 0.15s';
    pet.style.filter = `brightness(1.5) drop-shadow(0 0 15px ${color})`;
    setTimeout(() => {
        pet.style.filter = '';
        pet.style.transition = '';
    }, 400);
}

// 初始化时获取当前模型
if (electronAPI) {
    electronAPI.invoke('model-current').then(model => {
        if (model) updateModelBadge(model);
    });

    // 监听模型变更事件（来自托盘菜单切换）
    electronAPI.on('model-changed', (model) => {
        updateModelBadge(model);
        flashModelSwitch(model.color);
    });
}

async function screenshot() {
    if (!electronAPI) return;
    setMood('thinking');
    const result = await electronAPI.invoke('take-screenshot', 'manual');
    if (result.success) {
        setMood('happy');
        setTimeout(() => setMood('idle'), 2000);
    } else { setMood('idle'); }
}

async function send() {
    const msg = inputEl.value.trim();
    if (!msg || !electronAPI) return;
    inputEl.value = '';
    conversationModeActive = true;
    awaitingConversationReply = true;
    currentConversationTitle = msg;
    inputBar.classList.remove('show');
    hideConversationPanel();
    setConversationStatus('', '');
    showPendingReplyBubble(msg);
    setDockState('pending');
    setMood('thinking');
    if (conversationMode === 'openclaw') {
        const openClawReady = await ensureOpenClawReady();
        if (!openClawReady) {
            awaitingConversationReply = false;
            clearReplyConversation();
            inputBar.classList.add('show');
            setMood('idle');
            return;
        }
    }
    setConversationStatus(conversationMode === 'openclaw' ? 'OpenClaw is thinking...' : 'Basic AI is thinking...', '');
    const channel = conversationMode === 'openclaw' ? 'gateway-send' : 'direct-chat-send';
    let rawResult;
    try {
        rawResult = await electronAPI.invoke(channel, msg);
    } catch (err) {
        rawResult = { success: false, error: err?.message || 'Conversation failed.' };
    }
    const result = typeof rawResult === 'string'
        ? { success: !/^(错误|请求失败|连接失败|Error)/.test(rawResult), content: rawResult, error: rawResult }
        : rawResult;
    if (!result?.success) {
        awaitingConversationReply = false;
        clearReplyConversation();
        inputBar.classList.add('show');
        setConversationStatus(result?.error || 'Conversation failed.', 'error');
        setMood('idle');
        return;
    }
    if (result?.content) {
        inputBar.classList.remove('show');
        setMood('happy');
        recordPetAffinity('text-message');
        setTimeout(() => setMood('idle'), 3000);
    }
}

// ===== IPC =====
if (electronAPI) {
    electronAPI.on('appearance-changed', (state) => {
        renderAppearance(state);
    });
    electronAPI.on('new-message', (msg) => {
        setMood('talking');
        setTimeout(() => setMood('idle'), 3000);
    });
    electronAPI.on('agent-response', (res) => {
        if (shouldShowConversationReply()) {
            showReplyBubble(res);
            awaitingConversationReply = false;
        }
        lastTone = detectTone(res.content);
        // 🎭 根据 emotion 直接切换对应的 mood（每种都有独立配色）
        const emotionMoodMap = {
            happy: 'happy',
            surprised: 'surprised',
            sad: 'sad',
            fearful: 'fearful',
            angry: 'angry',
            thinking: 'thinking',
            calm: 'calm',
            disgusted: 'angry',
            excited: 'excited',
            love: 'love',
            focused: 'focused'
        };
        const mood = emotionMoodMap[res.emotion] || 'calm';
        setMood(mood);
        // 根据情绪调整恢复时间
        const recoveryTime = (mood === 'thinking') ? 8000 : (mood === 'sad') ? 7000 : (mood === 'fearful') ? 6000 : 5000;
        setTimeout(() => setMood('idle'), recoveryTime);
    });
    electronAPI.on('status-update', (s) => {
        const wasConnected = isConnected;
        isConnected = s.connected;
        if (!wasConnected && isConnected) {
            // 复活动画！从灰色→彩色
            setMood('happy');
            if (!hasSpritePet()) {
                squishing = true;
                pet.style.animation = 'squish 0.5s ease';
                setTimeout(() => { pet.style.animation = ''; squishing = false; }, 500);
            }
            spawnParticles();
            spawnParticles(); // 双倍粒子庆祝
            setTimeout(() => setMood('idle'), 3000);
        } else if (wasConnected && !isConnected) {
            setMood('offline');
        }
    });
}

// 状态检查
if (electronAPI) {
    setInterval(async () => {
        const s = await electronAPI.invoke('gateway-status');
        const wasConnected = isConnected;
        isConnected = s.connected;
        if (!wasConnected && isConnected && currentMood === 'offline') {
            // 复活！
            setMood('happy');
            if (!hasSpritePet()) {
                squishing = true;
                pet.style.animation = 'squish 0.5s ease';
                setTimeout(() => { pet.style.animation = ''; squishing = false; }, 500);
            }
            spawnParticles();
            spawnParticles();
            setTimeout(() => setMood('idle'), 3000);
        } else if (!isConnected && currentMood !== 'offline') {
            setMood('offline');
        }
    }, 10000);
}

// 初始化 — 先显示离线，等连接成功后复活
setMood('offline');
if (electronAPI) {
    setTimeout(async () => {
        const s = await electronAPI.invoke('gateway-status');
        isConnected = s.connected;
        if (isConnected) {
            setMood('happy');
            if (!hasSpritePet()) {
                squishing = true;
                pet.style.animation = 'squish 0.5s ease';
                setTimeout(() => { pet.style.animation = ''; squishing = false; }, 500);
            }
            spawnParticles();
            setTimeout(() => setMood('idle'), 2000);
        }
    }, 1500);
}
