<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Claw 🦞</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    *::-webkit-scrollbar { display: none; }
    :root {
        --hud-bg: rgba(246, 246, 242, 0.94);
        --hud-bg-dark: rgba(18, 18, 18, 0.92);
        --hud-line: #111111;
        --hud-muted: #6f6f6f;
        --hud-text: #111111;
        --hud-invert: #f7f7f2;
        --pixel-shadow: 0 0 0 1px rgba(255,255,255,0.7), 0 5px 0 rgba(0,0,0,0.34);
    }
    html, body {
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }
    .container {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        position: relative;
        padding: 0 10px 0;
    }

    /* ===== 流体球 67px ===== */
    .pet-wrapper {
        width: 67px;
        height: 67px;
        position: relative;
        cursor: grab;
        will-change: transform;
    }
    .pet-wrapper:active { cursor: grabbing; }

    .inner-fluid {
        position: absolute;
        top: 3px; left: 3px; right: 3px; bottom: 3px;
        border-radius: 50%;
        overflow: hidden;
        z-index: 1;
        background: linear-gradient(135deg, #ffb3b3, #fed6e3);
        transition: filter 0.4s ease;
    }
    .fluid-blob {
        position: absolute;
        width: 130%; height: 130%; top: -15%; left: -15%;
        background:
            radial-gradient(circle at 30% 30%, rgba(235,87,87,0.85), transparent 40%),
            radial-gradient(circle at 70% 65%, rgba(255,154,108,0.8), transparent 40%);
        animation: fluid-spin 8s linear infinite;
    }
    .fluid-blob-2 {
        position: absolute;
        width: 110%; height: 110%; top: -5%; left: -5%;
        background:
            radial-gradient(circle at 60% 30%, rgba(255,200,150,0.4), transparent 35%),
            radial-gradient(circle at 35% 70%, rgba(220,60,60,0.3), transparent 35%);
        animation: fluid-spin-r 12s linear infinite;
    }

    .glass-shell {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        border-radius: 50%; z-index: 2;
        /* 🔮 琉璃感：匹配Landing Page通透效果 */
        background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.12), rgba(255,255,255,0.03));
        box-shadow:
            inset -2px -2px 8px rgba(255,255,255,0.08),
            inset 2px 2px 8px rgba(255,255,255,0.35),
            0px 2px 6px rgba(220,80,80,0.08);
        border: 1px solid rgba(255,255,255,0.25);
        transition: box-shadow 1.0s cubic-bezier(0.4, 0.0, 0.2, 1), border 1.0s cubic-bezier(0.4, 0.0, 0.2, 1);
    }
    .glass-shell::before {
        content: '';
        position: absolute; top: 12%; left: 18%; width: 28%; height: 14%;
        border-radius: 50%; 
        background: rgba(255,255,255,0.55);
        filter: blur(1px); 
        transform: rotate(-40deg);
        transition: opacity 1.0s cubic-bezier(0.4, 0.0, 0.2, 1);
    }
    .glass-shell::after {
        content: '';
        position: absolute; bottom: 22%; right: 20%; width: 16%; height: 10%;
        border-radius: 50%;
        background: rgba(255,255,255,0.2);
        filter: blur(1px);
        transform: rotate(25deg);
        transition: opacity 1.0s cubic-bezier(0.4, 0.0, 0.2, 1);
    }

    /* 胶囊眼睛 — 大占比 */
    .eyes-container {
        position: absolute; z-index: 3;
        top: 16%; left: 10%; width: 80%; height: 50%;
        display: flex; justify-content: center; align-items: center;
        gap: 12px;
        pointer-events: none;
        overflow: visible;
    }
    .eye {
        width: 11px; height: 19px;
        background: white;
        border-radius: 6px;
        box-shadow: 0 0 8px rgba(255,255,255,0.9), 0 0 16px rgba(255,255,255,0.4);
        transition: width 0.18s, height 0.18s, border-radius 0.18s, transform 0.18s cubic-bezier(0.25, 1, 0.5, 1);
        transform-origin: center center;
    }

    /* 腮红 */
    .blush {
        position: absolute; z-index: 3;
        width: 14px; height: 8px; border-radius: 50%;
        background: rgba(255,130,130,0.25); filter: blur(3px);
        pointer-events: none; 
        /* 🎨 2秒平滑过渡 */
        transition: background 2.0s cubic-bezier(0.33, 0.0, 0.2, 1), opacity 0.6s ease; 
        opacity: 0.8;
    }
    .blush-l { top: 58%; left: 8%; }
    .blush-r { top: 58%; right: 8%; }

    /* 气泡装饰 */
    .bub {
        position: absolute; border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), rgba(255,255,255,0.06));
        border: 1px solid rgba(255,255,255,0.12);
        z-index: 0; opacity: 0; pointer-events: none;
    }
    .bub-1 { width: 5px; height: 5px; left: -5px; top: 60%; animation: bub 5s ease-in infinite 0s; }
    .bub-2 { width: 3px; height: 3px; right: -4px; top: 40%; animation: bub 6.5s ease-in infinite 2s; }

    .particles {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 10;
    }

    /* ===== 图标工具栏 ===== */
    .toolbar {
        position: absolute;
        bottom: 116px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 6px;
        padding: 6px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.16s steps(2), transform 0.16s steps(2);
        z-index: 20;
        background: var(--hud-bg);
        border: 2px solid var(--hud-line);
        box-shadow: var(--pixel-shadow);
        clip-path: polygon(6px 0, calc(100% - 6px) 0, 100% 6px, 100% calc(100% - 6px), calc(100% - 6px) 100%, 6px 100%, 0 calc(100% - 6px), 0 6px);
    }
    .toolbar.show {
        opacity: 1;
        pointer-events: auto;
        transform: translateX(-50%) translateY(-4px);
    }

    .tool-icon {
        width: 30px; height: 30px;
        border-radius: 0;
        border: 2px solid var(--hud-line);
        background: #ffffff;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        transition: transform 0.12s steps(2), border-color 0.12s steps(2), background 0.12s steps(2);
        box-shadow: inset -2px -2px 0 rgba(0,0,0,0.18);
    }
    .tool-icon svg {
        width: 15px; height: 15px;
        stroke: var(--hud-text); fill: none;
        stroke-width: 2; stroke-linecap: square; stroke-linejoin: miter;
    }
    .tool-icon:hover {
        transform: translateY(-2px);
        border-color: var(--hud-line);
        background: #111111;
    }
    .tool-icon:hover svg { stroke: var(--hud-invert); }
    .tool-icon:active { transform: translateY(1px); }

    .tool-icon.active {
        background: #e8e8e2;
        box-shadow: inset -2px -2px 0 rgba(0,0,0,0.18), 0 0 0 2px rgba(255,255,255,0.7);
    }

    /* 输入条 */
    .input-bar {
        position: absolute;
        bottom: 174px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 6px;
        padding: 6px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.16s steps(2), transform 0.16s steps(2);
        z-index: 20;
        background: var(--hud-bg);
        border: 2px solid var(--hud-line);
        box-shadow: var(--pixel-shadow);
    }
    .input-bar.show {
        opacity: 1;
        pointer-events: auto;
    }
    .input-bar input {
        width: 166px;
        padding: 6px 8px;
        border: 2px solid var(--hud-line);
        border-radius: 0;
        background: #ffffff;
        color: var(--hud-text);
        font-size: 11px;
        outline: none;
        letter-spacing: 0;
    }
    .input-bar button {
        padding: 4px 9px;
        border: 2px solid var(--hud-line);
        border-radius: 0;
        background: #111111;
        color: var(--hud-invert);
        font-size: 12px;
        cursor: pointer;
    }

    @keyframes fluid-spin {
        0% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(180deg) scale(1.08); }
        100% { transform: rotate(360deg) scale(1); }
    }
    @keyframes fluid-spin-r {
        0% { transform: rotate(360deg) scale(1.05); }
        50% { transform: rotate(180deg) scale(0.95); }
        100% { transform: rotate(0deg) scale(1.05); }
    }
    @keyframes bub {
        0% { opacity: 0; transform: translateY(0) scale(0.3); }
        15% { opacity: 0.5; }
        100% { opacity: 0; transform: translateY(-30px) translateX(5px) scale(1); }
    }
    @keyframes squish {
        0% { transform: scale(1, 1); }
        25% { transform: scale(1.15, 0.85); }
        50% { transform: scale(0.9, 1.1); }
        75% { transform: scale(1.05, 0.95); }
        100% { transform: scale(1, 1); }
    }
    /* ===== Codex-style cow-cat appearance ===== */
    .pet-wrapper {
        width: 104px;
        height: 82px;
        image-rendering: pixelated;
        transform-origin: 50% 72%;
    }
    .pet-wrapper::before {
        content: '';
        position: absolute;
        width: 30px;
        height: 14px;
        right: 6px;
        top: 44px;
        background: #ffffff;
        border: 3px solid #1a1a1a;
        border-left: 0;
        border-radius: 0 12px 12px 0;
        box-shadow: inset -12px 0 0 #1d1d1d;
        transform-origin: left center;
        animation: cow-tail 2.2s steps(3) infinite;
        z-index: 0;
    }
    .pet-wrapper::after {
        content: '';
        position: absolute;
        left: 28px;
        bottom: 1px;
        width: 12px;
        height: 8px;
        background: #1a1a1a;
        box-shadow: 20px 0 0 #1a1a1a;
        border-radius: 2px;
        z-index: 4;
    }
    .inner-fluid {
        top: 13px;
        left: 10px;
        right: 24px;
        bottom: 8px;
        border-radius: 18px 20px 16px 16px;
        overflow: visible;
        background: #ffffff;
        border: 3px solid #1a1a1a;
        box-shadow: inset -4px -4px 0 rgba(0,0,0,0.08), 0 3px 0 rgba(0,0,0,0.18);
        z-index: 2;
    }
    .fluid-blob {
        width: 25px;
        height: 21px;
        top: 8px;
        left: 3px;
        border-radius: 8px 10px 6px 9px;
        background: #1b1b1b;
        animation: cow-spot 2.8s steps(2) infinite;
    }
    .fluid-blob-2 {
        width: 20px;
        height: 18px;
        top: 28px;
        left: 41px;
        border-radius: 8px 5px 9px 5px;
        background: #202020;
        animation: none;
    }
    .glass-shell {
        top: 6px;
        left: 18px;
        width: 48px;
        height: 42px;
        border-radius: 16px 16px 14px 14px;
        background: #ffffff;
        border: 3px solid #1a1a1a;
        box-shadow: inset -3px -3px 0 rgba(0,0,0,0.08);
        z-index: 3;
    }
    .glass-shell::before,
    .glass-shell::after {
        content: '';
        position: absolute;
        top: -12px;
        width: 17px;
        height: 17px;
        background: #ffffff;
        border: 3px solid #1a1a1a;
        filter: none;
        border-radius: 4px 10px 4px 10px;
        transform: rotate(45deg);
    }
    .glass-shell::before { left: 3px; box-shadow: inset 4px 4px 0 #202020; }
    .glass-shell::after { right: 3px; box-shadow: inset -4px -4px 0 #202020; }
    .eyes-container {
        top: 20px;
        left: 23px;
        width: 39px;
        height: 18px;
        gap: 13px;
        z-index: 5;
    }
    .eye {
        width: 5px;
        height: 15px;
        border-radius: 1px;
        background: #dff8ff;
        border: 2px solid #111;
        box-shadow: inset 0 3px 0 #ffffff, 0 0 5px rgba(160,236,255,0.75);
    }
    .blush {
        top: 41px;
        width: 7px;
        height: 5px;
        background: #f0a7a2;
        filter: none;
        opacity: 0.7;
        border-radius: 2px;
        z-index: 5;
    }
    .blush-l { left: 25px; }
    .blush-r { right: 25px; }
    .pet-wrapper:not(.custom-image) .blush { display: none; }
    .bub { display: none; }
    .custom-pet-image {
        display: none;
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        image-rendering: pixelated;
        z-index: 4;
        pointer-events: none;
    }
    .custom-pet-sheet {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        max-width: none;
        max-height: none;
        object-fit: fill;
        image-rendering: pixelated;
        transform-origin: 0 0;
    }
    .pet-wrapper.custom-image .inner-fluid,
    .pet-wrapper.custom-image .fluid-blob,
    .pet-wrapper.custom-image .fluid-blob-2,
    .pet-wrapper.custom-image .glass-shell,
    .pet-wrapper.custom-image .eyes-container,
    .pet-wrapper.custom-image .blush {
        display: none;
    }
    .pet-wrapper.custom-image::before,
    .pet-wrapper.custom-image::after {
        display: none;
    }
    .pet-wrapper.custom-image {
        width: 104px;
        height: 113px;
    }
    .pet-wrapper.custom-image .custom-pet-image {
        display: block;
    }
    .pet-wrapper.mood-happy .glass-shell { transform: translateY(-1px); }
    .pet-wrapper.mood-thinking .glass-shell { transform: rotate(-3deg); }
    .pet-wrapper.mood-sleepy { filter: saturate(0.75) brightness(0.92); }
    .pet-wrapper.mood-sad { filter: saturate(0.7) hue-rotate(165deg); }
    .pet-wrapper.mood-surprised .eye { height: 18px; background: #ffffff; }
    .settings-panel {
        position: absolute;
        bottom: 174px;
        left: 50%;
        transform: translateX(-50%);
        width: 216px;
        max-height: 198px;
        padding: 8px;
        display: none;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        overflow-y: auto;
        border-radius: 0;
        border: 2px solid var(--hud-line);
        background: var(--hud-bg);
        box-shadow: var(--pixel-shadow);
        z-index: 30;
        clip-path: polygon(7px 0, calc(100% - 7px) 0, 100% 7px, 100% calc(100% - 7px), calc(100% - 7px) 100%, 7px 100%, 0 calc(100% - 7px), 0 7px);
    }
    .settings-panel.show { display: grid; }
    .settings-title,
    .settings-current,
    .settings-note,
    .settings-section {
        grid-column: 1 / -1;
        font-size: 10px;
        color: var(--hud-text);
    }
    .settings-title { font-weight: 800; letter-spacing: 0; color: #000; text-transform: uppercase; }
    .settings-current { color: var(--hud-muted); }
    .settings-section {
        margin-top: 3px;
        padding-top: 5px;
        border-top: 2px solid rgba(0,0,0,0.18);
        font-weight: 800;
        text-transform: uppercase;
    }
    .settings-note { color: #3d3d3d; line-height: 1.25; }
    .settings-panel button {
        border: 2px solid var(--hud-line);
        border-radius: 0;
        padding: 6px 4px;
        background: #ffffff;
        color: var(--hud-text);
        font-size: 10px;
        cursor: pointer;
        box-shadow: inset -2px -2px 0 rgba(0,0,0,0.38);
    }
    .settings-panel button:hover { background: #111111; color: var(--hud-invert); }
    .settings-panel .wide { grid-column: 1 / -1; }
    .game-panel {
        position: absolute;
        bottom: 174px;
        left: 50%;
        transform: translateX(-50%);
        width: 236px;
        max-height: 318px;
        padding: 8px;
        display: none;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        overflow-y: auto;
        border: 2px solid var(--hud-line);
        background: var(--hud-bg);
        box-shadow: var(--pixel-shadow);
        color: var(--hud-text);
        font-size: 10px;
        z-index: 31;
        clip-path: polygon(7px 0, calc(100% - 7px) 0, 100% 7px, 100% calc(100% - 7px), calc(100% - 7px) 100%, 7px 100%, 0 calc(100% - 7px), 0 7px);
    }
    .game-panel.show { display: grid; }
    .game-input,
    .game-panel textarea,
    .game-panel select {
        grid-column: 1 / -1;
        width: 100%;
        border: 2px solid var(--hud-line);
        border-radius: 0;
        background: #ffffff;
        color: var(--hud-text);
        padding: 6px;
        font: inherit;
        outline: none;
    }
    .game-panel textarea {
        height: 58px;
        resize: none;
        line-height: 1.28;
    }
    .game-row {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 4px;
    }
    .game-panel button {
        border: 2px solid var(--hud-line);
        border-radius: 0;
        min-height: 28px;
        padding: 5px 4px;
        background: #ffffff;
        color: var(--hud-text);
        font-size: 10px;
        cursor: pointer;
        box-shadow: inset -2px -2px 0 rgba(0,0,0,0.34);
    }
    .game-panel button:hover:not(:disabled),
    .game-panel button.active {
        background: #111111;
        color: var(--hud-invert);
    }
    .game-panel button:disabled {
        opacity: 0.45;
        cursor: default;
    }
    .game-panel .wide,
    .game-current,
    .ability-card,
    .skill-card {
        grid-column: 1 / -1;
    }
    #abilityList,
    #skillCardList {
        grid-column: 1 / -1;
        display: grid;
        gap: 6px;
    }
    .game-current {
        border: 2px dashed rgba(0,0,0,0.45);
        background: rgba(255,255,255,0.74);
        padding: 6px;
        min-height: 28px;
        line-height: 1.28;
        overflow-wrap: anywhere;
    }
    .ability-card,
    .skill-card {
        border: 2px solid var(--hud-line);
        background: #ffffff;
        padding: 6px;
        line-height: 1.25;
        overflow-wrap: anywhere;
        box-shadow: inset -2px -2px 0 rgba(0,0,0,0.12);
    }
    .ability-card.locked,
    .skill-card.locked {
        opacity: 0.6;
    }
    .ability-card strong,
    .skill-card strong {
        display: block;
        margin-bottom: 3px;
        font-size: 11px;
    }
    .ability-meta,
    .skill-meta {
        color: var(--hud-muted);
    }
    .ability-card button {
        width: 100%;
        margin-top: 5px;
    }
    @keyframes cow-tail {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(10deg); }
    }
    @keyframes cow-spot {
        0%, 100% { transform: translate(0,0); }
        50% { transform: translate(1px,1px); }
    }
</style>
</head>
<body>
<div class="container">
    <div class="pet-wrapper" id="pet">
        <div class="inner-fluid" id="fluid">
            <div class="fluid-blob" id="blob1"></div>
            <div class="fluid-blob-2" id="blob2"></div>
        </div>
        <div class="glass-shell"></div>
        <div class="eyes-container" id="eyes">
            <div class="eye" id="eyeL"></div>
            <div class="eye" id="eyeR"></div>
        </div>
        <div class="blush blush-l" id="blushL"></div>
        <div class="blush blush-r" id="blushR"></div>
        <div class="bub bub-1"></div>
        <div class="bub bub-2"></div>
        <div class="custom-pet-image" id="customPetImage">
            <img class="custom-pet-sheet" id="customPetSheet" alt="">
        </div>
        <div class="particles" id="particles"></div>
    </div>

    <!-- 图标工具栏 -->
    <div class="toolbar" id="toolbar">
        <div class="tool-icon" id="btnChat" title="发消息" onclick="toggleInput()">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="tool-icon" id="btnVoice" title="语音" onclick="toggleVoice()">
            <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </div>
        <div class="tool-icon" id="btnScreenshot" title="截图" onclick="screenshot()">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <div class="tool-icon" id="btnAdventure" title="Adventure" onclick="openFocusAdventure()">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M15 9l-2 6-4 2 2-6 4-2z"/></svg>
        </div>
        <div class="tool-icon" id="btnSettings" title="设置" onclick="toggleSettingsPanel()">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12h3M2 12h3M12 2v3M12 19v3M17 7l2-2M5 19l2-2M7 7 5 5M17 17l2 2"/></svg>
        </div>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <div class="settings-title">Settings</div>
        <div class="settings-current">Model <span id="modelBadge" style="font-weight:800;color:#111;">OP</span></div>
        <button class="wide" onclick="cycleModel()">Switch Model</button>
        <button class="wide" onclick="openModelPanel()">Model Panel</button>
        <div class="settings-section">Pet</div>
        <div class="settings-current" id="appearanceCurrent">Cow Cat</div>
        <button class="wide" onclick="openPetStudio()">Pet Studio</button>
        <button class="wide" onclick="resetAppearance()">Reset Pet</button>
        <div class="settings-section">Tools</div>
        <button id="settingsVoiceButton" onclick="toggleVoice()">Voice On</button>
        <button onclick="screenshot()">Screenshot</button>
        <div class="settings-section">Adventure</div>
        <button onclick="openFocusAdventure()">Focus</button>
        <button onclick="openAbilityTree()">Abilities</button>
        <button class="wide" onclick="openSkillBook()">Skills</button>

function renderAppearance(state) {
    if (!state) return;
    activeAppearance = state.appearance || activeAppearance;
    activePetManifest = state.activeManifest || null;
    const isCustomImage = state.activePet && ['image','spritesheet','frames'].includes(state.activePet.renderer) && state.activeImageUrl;
    pet.classList.toggle('custom-image', Boolean(isCustomImage));
    if (isCustomImage) {
        customPetSheet.src = state.activeImageUrl;
        if (state.activePet.renderer === 'spritesheet') {
            const columns = activePetManifest?.layout?.columns || 8;
            const rows = activePetManifest?.layout?.rows || Object.keys(activePetManifest?.states || {}).length || 9;
            customPetSheet.style.width = `${columns * 100}%`;
            customPetSheet.style.height = `${rows * 100}%`;
            customPetSheet.style.objectFit = 'fill';
            customPetSheet.style.transform = 'translate3d(0, 0, 0)';
        } else {
            customPetSheet.style.width = '100%';
            customPetSheet.style.height = '100%';
            customPetSheet.style.objectFit = 'contain';
            customPetSheet.style.transform = 'translate3d(0, 0, 0)';
        }
        appearanceCurrent.textContent = state.activePet.name || 'Custom Pet';
    } else {
        customPetSheet.removeAttribute('src');
        customPetSheet.style.width = '100%';
        customPetSheet.style.height = '100%';
        customPetSheet.style.objectFit = 'contain';
        customPetSheet.style.transform = 'translate3d(0, 0, 0)';
        appearanceCurrent.textContent = 'Cow Cat';
        fluid.style.background = '';
        blob1.style.background = '';
        blob2.style.background = '';
    }
    setMood(currentMood || 'idle');
    startSpriteAnimation();
}

function stopSpriteAnimation() {
    if (spriteFrameTimer) clearInterval(spriteFrameTimer);
    spriteFrameTimer = null;
    spriteFrameIndex = 0;
}

function updateSpriteFrame() {
    if (!activePetManifest || !pet.classList.contains('custom-image')) return;
    const state = activePetManifest.states?.[currentMood] || activePetManifest.states?.idle;
    if (!state || typeof state.row !== 'number') return;
    const frames = state.frames || 8;
    const columns = activePetManifest.layout?.columns || 8;
    const rows = activePetManifest.layout?.rows || Object.keys(activePetManifest.states || {}).length || 9;
    const frame = spriteFrameIndex % Math.min(frames, columns);
    customPetSheet.style.transform = `translate3d(${-frame * (100 / columns)}%, ${-state.row * (100 / rows)}%, 0)`;
    spriteFrameIndex = (spriteFrameIndex + 1) % frames;
}

function startSpriteAnimation() {
    stopSpriteAnimation();
    if (!activePetManifest || activePetManifest.renderer !== 'spritesheet') return;
    const state = activePetManifest.states?.[currentMood] || activePetManifest.states?.idle;
    const duration = state?.duration || 140;
    updateSpriteFrame();
    spriteFrameTimer = setInterval(updateSpriteFrame, duration);
}

function hasSpritePet() {
    return Boolean(activePetManifest && activePetManifest.renderer === 'spritesheet' && pet.classList.contains('custom-image'));
}

function playSpriteReaction(mood, duration = 900) {
    if (!hasSpritePet()) return false;
    const restoreMood = currentMood === 'offline' ? 'idle' : currentMood;
    clearTimeout(spriteReactionTimer);
    setMood(activePetManifest.states?.[mood] ? mood : 'happy');
    spriteReactionTimer = setTimeout(() => {
        setMood(restoreMood);
        spriteReactionTimer = null;
    }, duration);
    return true;
}

function pauseRoam(ms = 2500) {
    roamPausedUntil = Date.now() + ms;
    if (currentMood === 'walking') setMood('idle');
}

function shouldRoam() {
    if (!window.electronAPI || !hasSpritePet()) return false;
    if (Date.now() < roamPausedUntil || isDrag) return false;
    if (toolbar.classList.contains('show') || settingsPanel.classList.contains('show') || inputBar.classList.contains('show')) return false;
    return currentMood === 'idle' || currentMood === 'walking';
}

async function roamStep() {
    if (roamInFlight) return;
    if (!shouldRoam()) {
        if (currentMood === 'walking') setMood('idle');
        return;
    }
    roamInFlight = true;
    petFacing = roamDirection > 0 ? 1 : -1;
    if (currentMood !== 'walking') setMood('walking');
    try {
        const result = await electronAPI.invoke('roam-pet', { dx: roamDirection * 5, dy: 0 });
        if (result?.hitX || Math.random() < 0.015) {
            roamDirection *= -1;
            petFacing = roamDirection > 0 ? 1 : -1;
            roamPausedUntil = Date.now() + 350 + Math.random() * 900;
        }
    } catch (err) {
        roamPausedUntil = Date.now() + 3000;
    } finally {
        roamInFlight = false;
    }
}

async function loadAppearance() {

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
    })[char]);
}

    if (!focusTimerText) return;
    if (!activeFocusSession) {
        focusTimerText.textContent = 'No active adventure';

    const started = new Date(activeFocusSession.startedAt).getTime();
    const elapsed = Number.isFinite(started)

        : 0;

function pixelizeImage(dataUrl) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
            const small = document.createElement('canvas');
            const size = 44;
            small.width = size;
            small.height = size;
            const sctx = small.getContext('2d');
            sctx.imageSmoothingEnabled = true;
            sctx.clearRect(0, 0, size, size);
            const scale = Math.min(size / img.width, size / img.height);
            const w = img.width * scale;
            const h = img.height * scale;
            sctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);

            const out = document.createElement('canvas');
            out.width = 172;
            out.height = 164;
            const ctx = out.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            ctx.clearRect(0, 0, out.width, out.height);
            ctx.drawImage(small, 0, 0, size, size, 0, 0, out.width, out.height);
            resolve(out.toDataURL('image/png'));
        };
        img.onerror = () => reject(new Error('Unable to read selected image'));
        img.src = dataUrl;
    });
}

// ===== 60fps 动画 =====
let t = 0, squishing = false, targetScale = 1, curScale = 1, breathExtra = 0;

// 有机运动参数
let deepBreathPhase = 0;       // 深呼吸相位（0=正常，>0=正在深呼吸）
let fidgetSeed = Math.random() * 100;  // 微动作种子
let lastInteraction = Date.now();      // 上次互动时间

function loop() {
    t += 0.016;
    curScale += (targetScale - curScale) * 0.08;

    // === 多频叠加有机浮动（替代单一正弦波）===
    const floatY = Math.sin(t * 1.3) * 3.5
                 + Math.sin(t * 0.67) * 2
                 + Math.sin(t * 2.3) * 0.6;
    const floatR = Math.sin(t * 0.9) * 0.3
                 + Math.sin(t * 0.37) * 0.2;

    // === 呼吸：基础 + 偶尔深呼吸 ===
    let breathScale = 1 + Math.sin(t * 2) * 0.01
                        + Math.sin(t * 0.8) * 0.005;
    if (deepBreathPhase > 0) {
        // 深呼吸：吸气膨胀 → 呼气收缩
        breathScale += Math.sin(deepBreathPhase) * 0.025;
        deepBreathPhase += 0.04;
        if (deepBreathPhase > Math.PI) deepBreathPhase = 0;
    }

    // === 微动作：细微的重心移动 ===
    const fidgetX = Math.sin(t * 0.23 + fidgetSeed) * 0.6;
    const fidgetR = Math.sin(t * 0.17 + fidgetSeed * 2) * 0.12;

    const bounce = breathExtra > 0 ? Math.sin(t * 12) * breathExtra : 0;

    if (!squishing) {
        pet.style.transform = `translateX(${fidgetX}px) translateY(${floatY + bounce}px) rotate(${floatR + fidgetR}deg) scaleX(${petFacing}) scale(${curScale * breathScale})`;
    }
    requestAnimationFrame(loop);
}
loop();
loadAppearance();
loadPetProgress();

    electronAPI.on('pet-progress-changed', renderPetProgress);
}

// 深呼吸/叹气：每 20-40 秒触发一次
setInterval(() => {
    if (currentMood === 'talking' || currentMood === 'thinking') return;

}, 20000 + Math.random() * 20000);

// ===== 眼睛表情 =====

// 过渡速度预设
const EYE_SPEED = {
    snap:   '0s',                  // 瞬切（用于眨眼闭合瞬间）
    fast:   '0.08s',               // 快速（眨眼睁开）
    normal: '0.18s',               // 常规
    smooth: '0.3s',                // 平滑（情绪过渡）
    slow:   '0.45s',               // 慢（白日梦、发呆）
    drift:  '0.6s',                // 极慢（眼神缓慢飘移）
};

function _setEyeTransition(speed) {
    const dur = EYE_SPEED[speed] || speed || EYE_SPEED.normal;
    const ease = speed === 'snap' || speed === 'fast'
        ? 'linear'
        : speed === 'slow' || speed === 'drift'
            ? 'cubic-bezier(0.4, 0, 0.2, 1)'
            : 'cubic-bezier(0.25, 1, 0.5, 1)';
    const t = `width ${dur} ${ease}, height ${dur} ${ease}, border-radius ${dur} ${ease}, transform ${dur} ${ease}`;
    eyeL.style.transition = t;
    eyeR.style.transition = t;
}

function setEyes(L, R, speed) {
    if (speed) _setEyeTransition(speed);
    const d = { w:11, h:19, br:'6px', tx:0, ty:0, sx:1, sy:1, rot:0 };
    const l = { ...d, ...L };
    const r = R ? { ...d, ...R } : { ...l };
    eyeL.style.width = l.w+'px'; eyeL.style.height = l.h+'px'; eyeL.style.borderRadius = l.br;
    eyeL.style.transform = `translate(${l.tx}px,${l.ty}px) scale(${l.sx},${l.sy}) rotate(${l.rot}deg)`;
    eyeR.style.width = r.w+'px'; eyeR.style.height = r.h+'px'; eyeR.style.borderRadius = r.br;
    eyeR.style.transform = `translate(${r.tx}px,${r.ty}px) scale(${r.sx},${r.sy}) rotate(${r.rot}deg)`;
    // 用完后恢复默认速度
    if (speed) setTimeout(() => _setEyeTransition('normal'), 20);
}

const EXPR = {
    // --- normal 速度 (0.18s, 默认) ---
    normal:     () => setEyes({ w:11, h:19, br:'6px' }),
    lookLeft:   () => setEyes({ w:11, h:19, br:'6px', tx:-4 }),
    lookRight:  () => setEyes({ w:11, h:19, br:'6px', tx:4 }),
    lookUp:     () => setEyes({ w:11, h:19, br:'6px', ty:-5 }),
    lookDown:   () => setEyes({ w:11, h:15, br:'6px', ty:4 }),
    squint:     () => setEyes({ w:12, h:6, br:'4px', ty:1 }),
    talking:    () => setEyes({ w:10, h:17, br:'5px' }),
    talkBig:    () => setEyes({ w:12, h:20, br:'6px' }),

    // --- snap 速度 (0s, 瞬间) ---
    blink:      () => setEyes({ w:12, h:3, br:'3px' }, null, 'snap'),

    // --- fast 速度 (0.08s, 快速反应) ---
    halfBlink:  () => setEyes({ w:11, h:10, br:'5px' }, null, 'fast'),
    surprised:  () => setEyes({ w:13, h:21, br:'7px' }, null, 'fast'),
    wow:        () => setEyes({ w:16, h:16, br:'8px' }, null, 'fast'),
    sparkle:    () => setEyes({ w:12, h:12, br:'3px', rot:45 }, null, 'fast'),
    wink:       () => setEyes(
        { w:13, h:7, br:'7px 7px 3px 3px', ty:1 },
        { w:11, h:19, br:'6px' }, 'fast'
    ),
    winkR:      () => setEyes(
        { w:11, h:19, br:'6px' },
        { w:13, h:7, br:'7px 7px 3px 3px', ty:1 }, 'fast'
    ),
    dizzy:      () => setEyes(
        { w:10, h:10, br:'5px', rot:25, tx:-2 },
        { w:10, h:10, br:'5px', rot:-25, tx:2 }, 'fast'
    ),
    cross:      () => setEyes(
        { w:10, h:3, br:'2px', rot:30 },
        { w:10, h:3, br:'2px', rot:-30 }, 'fast'
    ),
    flattered:  () => setEyes({ w:14, h:20, br:'7px', sy:1.05 }, null, 'fast'),
    nervous:    () => setEyes({ w:9, h:14, br:'5px', ty:1, sx:0.9 }, null, 'fast'),

// ===== 鼠标跟随 =====
let mouseTracking = true;
document.addEventListener('mousemove', (e) => {
    if (!mouseTracking) return;
    const rect = pet.getBoundingClientRect();
    const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
    const dx = Math.max(-2, Math.min(2, (e.clientX - cx) / window.innerWidth * 6));
    const dy = Math.max(-2, Math.min(2, (e.clientY - cy) / window.innerHeight * 6));
    eyeL.style.transform = `translate(${dx}px,${dy}px)`;
    eyeR.style.transform = `translate(${dx}px,${dy}px)`;
});

// ===== 眨眼（自然节奏）=====
function doBlink() {
    if (currentMood === 'sleepy' || currentMood === 'happy') { schedBlink(); return; }
    mouseTracking = false;
    EXPR.blink();
    const r = Math.random();
    if (r < 0.15) {
        // 15% 连眨两下
        setTimeout(() => {
            EXPR.normal(); setTimeout(() => {
                EXPR.blink(); setTimeout(() => { applyMoodEyes(); mouseTracking = true; }, 70);
            }, 100);
        }, 70);
    } else if (r < 0.3) {
        // 15% 半眨 → 全眨
        setTimeout(() => {
            EXPR.halfBlink();
            setTimeout(() => { EXPR.blink(); setTimeout(() => { applyMoodEyes(); mouseTracking = true; }, 80); }, 120);
        }, 70 + Math.random() * 40);
    } else if (r < 0.4) {
        // 10% 慢眨（像在走神）
        setTimeout(() => {
            EXPR.halfBlink();
            setTimeout(() => { applyMoodEyes(); mouseTracking = true; }, 250 + Math.random() * 150);
        }, 120);
    } else {
        // 50% 正常快速眨
        setTimeout(() => { applyMoodEyes(); mouseTracking = true; }, 70 + Math.random() * 30);
    }
    schedBlink();
}
function schedBlink() {
    // 不均匀间隔：偶尔快速连眨，偶尔长时间不眨
    const base = Math.random() < 0.2 ? 800 + Math.random() * 1500 : 2500 + Math.random() * 5000;
    setTimeout(doBlink, base);
}
schedBlink();

// ===== 点击 =====
let isDrag = false, startX, startY, dragOffsetX, dragOffsetY, clickCount = 0, clickTimer = null;

pet.addEventListener('mousedown', e => { 
    pauseRoam(3000);
    isDrag = false; 
    startX = e.screenX; 
    startY = e.screenY; 
    // 记录鼠标在窗口内的相对位置，避免拖动时跳跃
    dragOffsetX = e.clientX;
    dragOffsetY = e.clientY;
});
document.addEventListener('mousemove', e => {
    if (startX !== undefined) {
        if (Math.abs(e.screenX - startX) > 3 || Math.abs(e.screenY - startY) > 3) isDrag = true;
    }
    if (isDrag && electronAPI) {
        // 用鼠标位置减去相对偏移，精确定位窗口
        electronAPI.send('drag-pet', {
            x: e.screenX, 
            y: e.screenY,
            offsetX: dragOffsetX,
            offsetY: dragOffsetY
        });
    }
});
document.addEventListener('mouseup', () => { setTimeout(() => { isDrag = false; startX = undefined; }, 30); });

pet.addEventListener('click', () => {
    if (isDrag) return;
    pauseRoam(2400);
    clickCount++;
    clearTimeout(clickTimer);

    const spritePet = hasSpritePet();
    if (!spritePet) {
        squishing = true;
        pet.style.animation = 'squish 0.35s cubic-bezier(0.34, 1.56, 0.64, 1)';
        pet.style.filter = 'brightness(1.15)';
        setTimeout(() => {
            pet.style.animation = '';
            pet.style.filter = '';
            squishing = false;
        }, 350);
    } else {
        pet.style.filter = 'brightness(1.08)';
        setTimeout(() => { pet.style.filter = ''; }, 260);
    }

    spawnParticles();
    mouseTracking = false;

    if (clickCount >= 3) {
        if (spritePet) {
            playSpriteReaction('surprised', 1200);
        } else {
            EXPR.superHappy();
            blushL.style.background = 'rgba(255,100,100,0.6)';
            blushR.style.background = 'rgba(255,100,100,0.6)';
            targetScale = 1.1;
            eyeL.style.transform = 'scale(1.15)';
            eyeR.style.transform = 'scale(1.15)';
        }
        if (electronAPI) electronAPI.invoke('show-history');
        setTimeout(() => {
            resetClick();
            clickCount = 0;
            eyeL.style.transform = '';
            eyeR.style.transform = '';
        }, 1200);
    } else {
        if (spritePet) {
            const rr = ['happy', 'talking', 'thinking'];
            playSpriteReaction(rr[Math.floor(Math.random() * rr.length)], 820);
        } else {
            const rr = ['happy','wink','winkR','surprised','curious','giggle','sparkle','wow'];
            EXPR[rr[Math.floor(Math.random()*rr.length)]]();
        }
        clickTimer = setTimeout(() => { resetClick(); clickCount = 0; }, 800);
    }
});

function resetClick() {
    applyMoodEyes();
    blushL.style.background = ''; blushR.style.background = '';
    targetScale = MOODS[currentMood]?.scale || 1;
    mouseTracking = true;
}

    // 鼠标进入时眼睛微微睁大
    eyeL.style.transform = 'scale(1.08)';
    eyeR.style.transform = 'scale(1.08)';

    pet.style.filter = 'brightness(1.05)';
});

    eyeL.style.transform = '';
    eyeR.style.transform = '';
    pet.style.filter = '';
});

function spawnParticles() {
    const colors = ['#ff6b6b','#ffa07a','#ffb347','#ff69b4','#fff','#ffd700'];
    for (let i = 0; i < 8; i++) {
        const p = document.createElement('div');
        const sz = 2 + Math.random() * 3;
        const a = (Math.PI * 2 / 8) * i + Math.random() * 0.4;
        const dist = 15 + Math.random() * 25;
        p.style.cssText = `position:absolute;border-radius:50%;pointer-events:none;
            width:${sz}px;height:${sz}px;
            background:${colors[Math.floor(Math.random()*colors.length)]};
            left:50%;top:50%;opacity:1;
            transition:transform 0.4s ease-out,opacity 0.4s ease-out;`;
        particlesEl.appendChild(p);
        requestAnimationFrame(() => {
            p.style.transform = `translate(${Math.cos(a)*dist}px,${Math.sin(a)*dist}px)`;
            p.style.opacity = '0';
        });
        setTimeout(() => p.remove(), 450);
    }
}

let currentMood = 'idle', talkInterval = null;

function applyMoodEyes() {
    const m = MOODS[currentMood];
    if (m && EXPR[m.eyes]) EXPR[m.eyes]();
}

function setMood(mood) {
    const map = { normal:'idle', busy:'talking', excited:'happy' };
    mood = map[mood] || mood;
    if (!MOODS[mood]) mood = 'idle';
    const m = MOODS[mood];
    pet.className = pet.className
        .split(/\s+/)
        .filter(c => c && !c.startsWith('mood-'))
        .concat('mood-' + mood)
        .join(' ');

    // 任何情绪变化都算互动
    lastInteraction = Date.now();

    if (mood !== currentMood) {
        // 打断上一次未完成的过渡
        if (_moodTimer) { clearTimeout(_moodTimer); _moodTimer = null; }

        // filter 柔光过渡：亮起 → 换色 → 淡出，遮掩 gradient 跳变
        fluid.style.transition = 'filter 0.35s ease-in';
        fluid.style.filter = 'brightness(1.6) blur(2px)';

        _moodTimer = setTimeout(() => {
            // 峰值时瞬间换色（人眼在高亮度下感知不到跳变）
            if (pet.classList.contains('custom-image')) {
                fluid.style.background = m.fluid;
                blob1.style.background = m.b1;
                blob2.style.background = m.b2;
            }
            // 🔮 应用情绪发光效果
            if (m.glow && glassShell) {
                glassShell.style.boxShadow = 'inset -2px -2px 8px rgba(255,255,255,0.08), inset 2px 2px 8px rgba(255,255,255,0.35), ' + m.glow;
            }
            blob1.style.animation = 'fluid-spin ' + m.speed + ' linear infinite';

            // 淡出回正常
            fluid.style.transition = 'filter 0.5s ease-out';
            fluid.style.filter = 'brightness(1) blur(0px)';

            _moodTimer = setTimeout(() => {
                fluid.style.transition = '';
                fluid.style.filter = '';
                _moodTimer = null;
            }, 550);
        }, 350);
    }

    currentMood = mood;
    blob1.style.animationDuration = m.speed;

    if (mood === 'sleepy' || mood === 'sad') {
        blob1.style.transition = 'opacity 1.5s ease';
        blob1.style.opacity = '0.6';
    } else {
        blob1.style.transition = 'opacity 1.0s ease';
        blob1.style.opacity = '1';
    }

    targetScale = m.scale; breathExtra = m.bounce;
    mouseTracking = (mood !== 'sleepy' && mood !== 'happy' && mood !== 'sad');
    if (talkInterval) { clearInterval(talkInterval); talkInterval = null; }
    if (mood === 'talking') {
        let tog = false;
        talkInterval = setInterval(() => { tog=!tog; tog ? EXPR.talkBig() : EXPR.talking(); }, 250);
    } else { applyMoodEyes(); }
    startSpriteAnimation();

    if (mood === 'happy' || mood === 'excited' || mood === 'love') {
        blushL.style.transition = 'background 0.8s ease, opacity 0.6s ease';
        blushR.style.transition = 'background 0.8s ease, opacity 0.6s ease';
        blushL.style.background = mood === 'love' ? 'rgba(255,90,120,0.5)' : 'rgba(255,120,120,0.4)';
        blushR.style.background = mood === 'love' ? 'rgba(255,90,120,0.5)' : 'rgba(255,120,120,0.4)';
    } else {
        blushL.style.transition = 'background 0.6s ease, opacity 0.4s ease';
        blushR.style.transition = 'background 0.6s ease, opacity 0.4s ease';
        blushL.style.background = '';
        blushR.style.background = '';
    }
}

// ===== 待机微表情（心情 + 场景 + 语气 三维触发）=====

// 时间场景判定
function getTimeScene() {
    const h = new Date().getHours();
    if (h >= 6 && h < 11)  return 'morning';
    if (h >= 11 && h < 14) return 'noon';
    if (h >= 14 && h < 18) return 'afternoon';
    if (h >= 18 && h < 22) return 'evening';
    return 'latenight';
}

// 语气状态（从 AI 回复文本中提取）
let lastTone = 'neutral';
function detectTone(text) {
    if (!text) return 'neutral';
    if (/哈哈|嘻嘻|😄|😆|笑|开心|太好了|棒|厉害|不错|好耶/.test(text)) return 'cheerful';
    if (/害羞|脸红|嘿嘿|😳|😊|人家/.test(text)) return 'shy';
    if (/生气|可恶|气死|哼|😠|😤|讨厌/.test(text)) return 'annoyed';
    if (/难过|伤心|唉|😢|😭|呜呜|抱歉|对不起/.test(text)) return 'sad';
    if (/好奇|为什么|怎么|吗？|呢？|🤔|想想/.test(text)) return 'curious';
    if (/加油|冲|💪|努力|一定可以|相信/.test(text)) return 'encourage';
    if (/困|累|😴|哈欠|想睡|好困/.test(text)) return 'tired';
    if (/惊|天哪|什么|😱|😮|不会吧|哇/.test(text)) return 'surprised';
    if (/嗯|好的|了解|明白|知道了|收到/.test(text)) return 'calm';
    return 'neutral';
}

// 时间场景 → 偏好的动作池权重
const SCENE_WEIGHTS = {
    morning:   { sleepy: 4, daily: 3, dreamy: 2, shy: 1, thinking: 1 },
    noon:      { daily: 3, happy: 2, playful: 2, thinking: 1, sleepy: 1 },
    afternoon: { daily: 3, thinking: 2, happy: 1, dreamy: 1, playful: 1, encourage: 1 },
    evening:   { daily: 2, happy: 2, dreamy: 2, shy: 1, sleepy: 2 },
    latenight: { sleepy: 5, dreamy: 2, daily: 1, dizzy: 2, sad: 1 },
};

// 语气 → 偏好的动作池映射
const TONE_MAP = {
    cheerful: 'happy', shy: 'shy', annoyed: 'annoyed', sad: 'sad',
    curious: 'thinking', encourage: 'encourage', tired: 'sleepy',
    surprised: 'surprised', calm: 'dreamy', neutral: null,
};

// 智能选择动作
function pickIdleAction() {
    const scene = getTimeScene();
    const tonePool = TONE_MAP[lastTone];

    // 语气优先：最近有明确语气时 70% 概率按语气选
    if (tonePool && ACT[tonePool] && Math.random() < 0.7) {
        lastTone = 'neutral';
        const pool = ACT[tonePool];
        return pool[Math.floor(Math.random() * pool.length)];
    }

    // 否则按时间场景加权随机
    const weights = SCENE_WEIGHTS[scene] || SCENE_WEIGHTS.afternoon;
    const entries = [];
    for (const [cat, w] of Object.entries(weights)) {
        if (ACT[cat]) for (let i = 0; i < w; i++) entries.push(cat);
    }
    const cat = entries[Math.floor(Math.random() * entries.length)];
    const pool = ACT[cat];
    return pool[Math.floor(Math.random() * pool.length)];
}

setInterval(() => {
    if (currentMood !== 'idle' || !mouseTracking) return;

    const idleTime = (Date.now() - lastInteraction) / 1000; // 秒

    // === 无聊渐进系统 ===
    if (idleTime > 180 && Math.random() < 0.25) {
        // 3 分钟没互动：打哈欠 / 伸懒腰
        mouseTracking = false;
        const r = Math.random();
        if (r < 0.4) {
            // 打哈欠：嘴巴张大 → 眯眼 → 发呆
            EXPR.wow();
            const s = targetScale;
            targetScale = 1.06;
            setTimeout(() => { EXPR.sleepy(); targetScale = s; }, 800);
            setTimeout(() => { EXPR.drowsy(); }, 1500);
            setTimeout(() => { EXPR.normal(); mouseTracking = true; }, 2500);
        } else if (r < 0.7) {
            // 伸懒腰 → 抖一抖 → 精神
            const s = targetScale;
            EXPR.sleepy();
            targetScale = 1.1;
            setTimeout(() => { targetScale = 0.92; }, 600);
            setTimeout(() => { targetScale = 1.06; EXPR.surprised(); }, 900);
            setTimeout(() => { targetScale = s; EXPR.normal(); mouseTracking = true; }, 1400);
        } else {
            // 发呆 → 慢慢回神
            EXPR.drowsy();
            setTimeout(() => EXPR.halfBlink(), 1200);
            setTimeout(() => { EXPR.blink(); }, 2000);
            setTimeout(() => { EXPR.curious(); }, 2200);
            setTimeout(() => { EXPR.normal(); mouseTracking = true; }, 2800);
        }
        return;
    }

    if (idleTime > 60 && Math.random() < 0.3) {
        // 1 分钟没互动：更多张望 / 无聊行为
        mouseTracking = false;
        const r = Math.random();
        if (r < 0.3) {
            // 叹气：深呼吸 + 半眨眼
            deepBreathPhase = 0.01;
            EXPR.halfBlink();
            setTimeout(() => { EXPR.normal(); mouseTracking = true; }, 1500);
        } else if (r < 0.6) {
            // 左右张望，像在找事做
            EXPR.lookLeft();
            setTimeout(() => EXPR.lookUp(), 500);
            setTimeout(() => EXPR.lookRight(), 1000);
            setTimeout(() => { EXPR.hmm(); }, 1500);
            setTimeout(() => { EXPR.normal(); mouseTracking = true; }, 2200);
        } else {
            // 无聊歪头
            EXPR.hmm();
            const s = targetScale;
            targetScale = 0.97;
            setTimeout(() => { targetScale = s; EXPR.blink(); }, 1000);
            setTimeout(() => { EXPR.normal(); mouseTracking = true; }, 1300);
        }
        return;
    }

    // === 常规待机微表情（30% 触发率）===
    if (Math.random() < 0.3) {
        mouseTracking = false;
        pickIdleAction()();
        setTimeout(() => { mouseTracking = true; }, 1500);
    }
}, 4000);

// === 待机眼神游走（独立于微表情）===
setInterval(() => {
    if (currentMood !== 'idle' || !mouseTracking) return;
    if (Math.random() < 0.35) {
        // 眼睛缓慢飘向一个随机方向，像在"看"什么
        const dx = (Math.random() - 0.5) * 4;
        const dy = (Math.random() - 0.5) * 3;
        eyeL.style.transition = 'transform 0.8s ease';
        eyeR.style.transition = 'transform 0.8s ease';
        eyeL.style.transform = `translate(${dx}px,${dy}px)`;
        eyeR.style.transform = `translate(${dx}px,${dy}px)`;
        // 停留一会再飘回来
        setTimeout(() => {
            eyeL.style.transition = 'transform 1.2s ease';
            eyeR.style.transition = 'transform 1.2s ease';
            eyeL.style.transform = '';
            eyeR.style.transform = '';
            setTimeout(() => {
                eyeL.style.transition = '';
                eyeR.style.transition = '';
            }, 1200);
        }, 1500 + Math.random() * 2000);
    }
}, 5000);

// 记录互动时间
pet.addEventListener('mousedown', () => { lastInteraction = Date.now(); });
document.addEventListener('keydown', () => { lastInteraction = Date.now(); });

// ===== 工具栏 =====
function toggleInput() {
    pauseRoam(3500);
    settingsPanel.classList.remove('show');
    hideGamePanels();
    inputBar.classList.toggle('show');
    if (inputBar.classList.contains('show')) inputEl.focus();
}

function toggleVoice() {
    voiceOn = !voiceOn;
    btnVoice.innerHTML = voiceOn
        ? '<svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>'
        : '<svg viewBox="0 0 24 24"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2c0 .76-.12 1.5-.35 2.18"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>';
    btnVoice.classList.toggle('active', voiceOn);
    if (settingsVoiceButton) settingsVoiceButton.textContent = voiceOn ? 'Voice On' : 'Voice Off';
    if (electronAPI) electronAPI.invoke('set-voice-enabled', voiceOn);
    setMood('happy');
    setTimeout(() => setMood('idle'), 1500);
}

// ===== 模型切换 (CC Switch风格) =====
const modelBadge = document.getElementById('modelBadge');
let currentModelColor = '#E8A838';

async function cycleModel() {
    if (!electronAPI) return;
    setMood('thinking');
    const raw = await electronAPI.invoke('model-next');
    const model = (raw && typeof raw === 'object' && ('success' in raw || 'model' in raw || 'error' in raw))
        ? (raw.success ? raw.model : null)
        : raw;
    if (model) {
        updateModelBadge(model);
        // 球体闪变动画
        flashModelSwitch(model.color);
        setMood('happy');
        setTimeout(() => setMood('idle'), 2000);
    } else {
        setMood('idle');
    }
}

async function openModelPanel() {
    if (!electronAPI) return;
    await electronAPI.invoke('model-open-settings');
    setAppearanceNote('Model panel opened.');
}

async function openPetStudio() {
    if (!electronAPI) return;
    await electronAPI.invoke('pet-studio-open');
    setAppearanceNote('Pet Studio opened.');
}

function selectFocusDuration(minutes) {
    selectedFocusDuration = minutes;
    document.querySelectorAll('#focusDurations button').forEach(button => {
        button.classList.toggle('active', Number(button.dataset.minutes) === minutes);
    });
}

function openFocusAdventure() {
    showGamePanel(focusAdventurePanel);
    selectFocusDuration(selectedFocusDuration);
    loadPetProgress();
}

function openAbilityTree() {
    showGamePanel(abilityTreePanel);
    loadPetProgress();
}

function openSkillBook() {
    showGamePanel(skillBookPanel);
    loadPetProgress();
}

async function startFocusAdventure() {
    if (!window.electronAPI) return;
    const result = await electronAPI.invoke('focus-adventure-start', {
        taskTitle: focusTaskTitle.value,
        plannedMinutes: selectedFocusDuration,
        intentType: focusIntentType.value
    });
    if (!result.success) {
        focusRewardText.textContent = result.error || 'Could not start adventure';
        renderPetProgress(result.progress);
        return;
    }
    activeFocusSession = result.activeFocusSession;
    renderPetProgress(result.progress);
    setMood('focused');
    focusRewardText.textContent = 'Adventure started.';
}

async function finishFocusAdventure(status) {
    if (!window.electronAPI) return;
    const result = await electronAPI.invoke('focus-adventure-finish', {
        status,
        summary: focusSummary.value.trim()
    });
    if (!result.success) {
        focusRewardText.textContent = result.error || 'Could not finish adventure';
        renderPetProgress(result.progress);
        return;
    }
    renderPetProgress(result.progress);
    setMood(status === 'interrupted' ? 'sleepy' : 'happy');
    setTimeout(() => setMood('idle'), 2500);
    if (focusSummary) focusSummary.value = '';
    const rewards = result.session.rewards;
    focusRewardText.textContent = `+${rewards.focusXp} XP, +${rewards.abilityFragments} fragments, +${rewards.stardust} stardust${rewards.skillSeed ? ', Skill Seed found' : ''}`;
}

async function unlockPetAbility(abilityId) {
    if (!window.electronAPI) return;
    const result = await electronAPI.invoke('pet-ability-unlock', abilityId);
    renderPetProgress(result.progress);
    if (!result.success) {
        focusRewardText.textContent = result.error || 'Ability locked';
        return;
    }
    focusRewardText.textContent = 'Ability unlocked.';
    setMood('happy');
    setTimeout(() => setMood('idle'), 2000);
}

function updateModelBadge(model) {
    if (!modelBadge || !model) return;
    modelBadge.textContent = model.icon;
    modelBadge.style.color = '#111';
    currentModelColor = model.color;
}

function flashModelSwitch(color) {
    // 球体快速闪变效果
    const pet = document.getElementById('pet');
    pet.style.transition = 'filter 0.15s';
    pet.style.filter = `brightness(1.5) drop-shadow(0 0 15px ${color})`;
    setTimeout(() => {
        pet.style.filter = '';
        pet.style.transition = '';
    }, 400);
}

// 初始化时获取当前模型
if (electronAPI) {
    electronAPI.invoke('model-current').then(model => {
        if (model) updateModelBadge(model);
    });

    // 监听模型变更事件（来自托盘菜单切换）
    electronAPI.on('model-changed', (model) => {
        updateModelBadge(model);
        flashModelSwitch(model.color);
    });
}

async function screenshot() {
    if (!electronAPI) return;
    setMood('thinking');
    const result = await electronAPI.invoke('take-screenshot', 'manual');
    if (result.success) {
        setMood('happy');
        setTimeout(() => setMood('idle'), 2000);
    } else { setMood('idle'); }
}

async function send() {
    const msg = inputEl.value.trim();
    if (!msg || !electronAPI) return;
    inputEl.value = '';
    inputBar.classList.remove('show');
    setMood('thinking');
    const reply = await electronAPI.invoke('gateway-send', msg);
    if (reply) { setMood('happy'); setTimeout(() => setMood('idle'), 3000); }
}

// ===== IPC =====
if (electronAPI) {
    electronAPI.on('appearance-changed', (state) => {
        renderAppearance(state);
    });
    electronAPI.on('new-message', (msg) => {
        setMood('talking');
        setTimeout(() => setMood('idle'), 3000);
    });
    electronAPI.on('agent-response', (res) => {
        lastTone = detectTone(res.content);
        // 🎭 根据 emotion 直接切换对应的 mood（每种都有独立配色）
        const emotionMoodMap = {
            happy: 'happy',
            surprised: 'surprised',
            sad: 'sad',
            fearful: 'fearful',
            angry: 'angry',
            thinking: 'thinking',
            calm: 'calm',
            disgusted: 'angry',
            excited: 'excited',
            love: 'love',
            focused: 'focused'
        };
        const mood = emotionMoodMap[res.emotion] || 'calm';
        setMood(mood);
        // 根据情绪调整恢复时间
        const recoveryTime = (mood === 'thinking') ? 8000 : (mood === 'sad') ? 7000 : (mood === 'fearful') ? 6000 : 5000;
        setTimeout(() => setMood('idle'), recoveryTime);
    });
    electronAPI.on('status-update', (s) => {
        const wasConnected = isConnected;
        isConnected = s.connected;
        if (!wasConnected && isConnected) {
            // 复活动画！从灰色→彩色
            setMood('happy');
            if (!hasSpritePet()) {
                squishing = true;
                pet.style.animation = 'squish 0.5s ease';
                setTimeout(() => { pet.style.animation = ''; squishing = false; }, 500);
            }
            spawnParticles();
            spawnParticles(); // 双倍粒子庆祝
            setTimeout(() => setMood('idle'), 3000);
        } else if (wasConnected && !isConnected) {
            setMood('offline');
        }
    });
}

// 状态检查
if (electronAPI) {
    setInterval(async () => {
        const s = await electronAPI.invoke('gateway-status');
        const wasConnected = isConnected;
        isConnected = s.connected;
        if (!wasConnected && isConnected && currentMood === 'offline') {
            // 复活！
            setMood('happy');
            if (!hasSpritePet()) {
                squishing = true;
                pet.style.animation = 'squish 0.5s ease';
                setTimeout(() => { pet.style.animation = ''; squishing = false; }, 500);
            }
            spawnParticles();
            spawnParticles();
            setTimeout(() => setMood('idle'), 3000);
        } else if (!isConnected && currentMood !== 'offline') {
            setMood('offline');
        }
    }, 10000);
}

// 初始化 — 先显示离线，等连接成功后复活
setMood('offline');
if (electronAPI) {
    setTimeout(async () => {
        const s = await electronAPI.invoke('gateway-status');
        isConnected = s.connected;
        if (isConnected) {
            setMood('happy');
            if (!hasSpritePet()) {
                squishing = true;
                pet.style.animation = 'squish 0.5s ease';
                setTimeout(() => { pet.style.animation = ''; squishing = false; }, 500);
            }
            spawnParticles();
            setTimeout(() => setMood('idle'), 2000);
        }
    }, 1500);
}
</script>
