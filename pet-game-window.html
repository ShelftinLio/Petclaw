<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petclaw Adventure</title>
<style>
    :root {
        --bg: #f7f7f2;
        --paper: #ffffff;
        --ink: #111111;
        --muted: #666666;
        --soft: #e9e9e2;
        --accent: #dff8ff;
        --reward: #fff1bd;
        --danger: #fff1f1;
    }

    * { box-sizing: border-box; }

    html,
    body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
    }

    body {
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        font-size: 11px;
        letter-spacing: 0;
        user-select: none;
    }

    button,
    input,
    select,
    textarea {
        font: inherit;
        letter-spacing: 0;
    }

    button {
        min-width: 0;
        border: 2px solid var(--ink);
        border-radius: 0;
        background: var(--paper);
        color: var(--ink);
        cursor: pointer;
        box-shadow: inset -2px -2px 0 rgba(0, 0, 0, 0.22);
    }

    button:hover:not(:disabled),
    button.active {
        background: var(--ink);
        color: var(--paper);
    }

    button:disabled {
        opacity: 0.42;
        cursor: default;
    }

    input,
    select,
    textarea {
        width: 100%;
        border: 2px solid var(--ink);
        border-radius: 0;
        background: var(--paper);
        color: var(--ink);
        outline: none;
    }

    input,
    select {
        height: 28px;
        padding: 4px 6px;
    }

    textarea {
        height: 56px;
        min-height: 56px;
        max-height: 88px;
        padding: 5px 6px;
        resize: vertical;
        line-height: 1.25;
    }

    .compact-shell {
        width: 100%;
        height: 100vh;
        display: grid;
        grid-template-rows: auto 32px 1fr;
        background: var(--bg);
    }

    .topbar {
        display: grid;
        gap: 5px;
        padding: 7px 8px 6px;
        border-bottom: 2px solid var(--ink);
        background: var(--paper);
    }

    .title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-width: 0;
    }

    h1 {
        margin: 0;
        font-size: 12px;
        line-height: 1;
        text-transform: uppercase;
    }

    .tier-badge {
        max-width: 126px;
        padding: 2px 5px;
        border: 2px solid var(--ink);
        background: var(--accent);
        font-size: 10px;
        font-weight: 800;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .status-cluster {
        display: flex;
        align-items: center;
        gap: 4px;
        min-width: 0;
    }

    .script-status {
        padding: 2px 4px;
        border: 2px solid var(--ink);
        background: var(--soft);
        font-size: 9px;
        font-weight: 800;
        white-space: nowrap;
    }

    .script-status.ready {
        background: var(--reward);
    }

    .script-status.error {
        background: var(--danger);
    }

    .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 4px;
    }

    .stat {
        min-width: 0;
        border: 2px solid var(--ink);
        background: var(--soft);
        padding: 3px 4px;
        line-height: 1.1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .tabs {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        border-bottom: 2px solid var(--ink);
    }

    .tabs button {
        border-width: 0 2px 0 0;
        box-shadow: none;
        font-weight: 800;
    }

    .tabs button:last-child { border-right: 0; }

    main {
        min-height: 0;
        overflow: auto;
        padding: 7px;
    }

    main::-webkit-scrollbar { width: 0; height: 0; }

    .view { display: none; }

    .view.active {
        display: grid;
        gap: 7px;
    }

    .block {
        display: grid;
        gap: 6px;
        padding: 7px;
        border: 2px solid var(--ink);
        background: var(--paper);
        box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.15);
    }

    .compact-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        min-width: 0;
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
    }

    .hint {
        color: var(--muted);
        font-size: 10px;
        line-height: 1.25;
        overflow-wrap: anywhere;
    }

    .duration-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 4px;
    }

    .duration-row button,
    .action-row button,
    .mini-action {
        min-height: 26px;
        padding: 3px 4px;
        font-size: 10px;
        font-weight: 800;
    }

    .action-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 4px;
    }

    .primary {
        background: var(--ink);
        color: var(--paper);
    }

    .danger-action {
        background: var(--danger);
    }

    .status-box {
        min-height: 34px;
        padding: 6px;
        border: 2px dashed rgba(0, 0, 0, 0.45);
        background: var(--bg);
        line-height: 1.25;
        overflow-wrap: anywhere;
    }

    .timer-card {
        display: grid;
        gap: 4px;
        padding: 7px;
        border: 2px solid var(--ink);
        background: var(--soft);
    }

    .timer-card[data-active-session="true"] {
        background: var(--accent);
    }

    .timer-card.overtime {
        background: var(--reward);
    }

    .timer-label {
        font-size: 28px;
        line-height: 1;
        font-weight: 900;
        font-variant-numeric: tabular-nums;
    }

    .timer-meta {
        color: var(--muted);
        font-size: 10px;
        line-height: 1.2;
    }

    .timer-bar {
        height: 8px;
        border: 2px solid var(--ink);
        background: var(--paper);
        overflow: hidden;
    }

    .timer-fill {
        width: 0%;
        height: 100%;
        background: var(--ink);
        transition: width 180ms linear;
    }

    .reward-box {
        min-height: 28px;
        padding: 6px;
        border: 2px solid var(--ink);
        background: var(--reward);
        line-height: 1.25;
        overflow-wrap: anywhere;
    }

    .affinity-panel {
        display: grid;
        gap: 6px;
        padding: 6px;
        border: 2px solid var(--ink);
        background: rgba(255, 255, 255, 0.78);
    }

    .affinity-meter {
        height: 8px;
        border: 2px solid var(--ink);
        background: var(--paper);
        overflow: hidden;
    }

    .affinity-fill {
        width: 0%;
        height: 100%;
        background: var(--accent);
        transition: width 180ms linear;
    }

    .bond-collection {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 5px;
    }

    .bond-card {
        min-width: 0;
        padding: 5px;
        border: 2px solid var(--ink);
        background: var(--paper);
        font-size: 10px;
        font-weight: 800;
        overflow-wrap: anywhere;
    }

    .bond-card.locked {
        opacity: 0.52;
    }

    .card-list {
        display: grid;
        gap: 6px;
    }

    .ability-card,
    .skill-card,
    .run-card {
        display: grid;
        gap: 4px;
        padding: 6px;
        border: 2px solid var(--ink);
        background: var(--paper);
        line-height: 1.22;
        overflow-wrap: anywhere;
    }

    .ability-card.locked,
    .skill-card.locked {
        opacity: 0.64;
    }

    .card-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 6px;
        min-width: 0;
    }

    .card-title {
        min-width: 0;
        font-size: 11px;
        font-weight: 900;
        overflow-wrap: anywhere;
    }

    .meta {
        color: var(--muted);
        font-size: 10px;
        line-height: 1.2;
    }

    .pill {
        flex: 0 0 auto;
        max-width: 96px;
        padding: 1px 4px;
        border: 2px solid var(--ink);
        background: var(--soft);
        font-size: 9px;
        font-weight: 800;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .empty {
        padding: 9px;
        border: 2px dashed rgba(0, 0, 0, 0.4);
        background: rgba(255, 255, 255, 0.72);
        color: var(--muted);
        line-height: 1.25;
    }
</style>
</head>
<body>
<div class="compact-shell">
        <header class="topbar">
            <div class="title-row">
                <h1>Adventure</h1>
                <div class="status-cluster">
                    <div class="tier-badge" id="tierBadge">Companion</div>
                    <div class="script-status" id="scriptStatus">Boot</div>
                </div>
            </div>
        <div class="stats" id="levelLine">
            <div class="stat">Lv 1</div>
            <div class="stat">XP 0</div>
            <div class="stat">Fx 0 / Sd 0</div>
        </div>
    </header>

    <nav class="tabs" aria-label="Pet adventure tabs">
        <button class="active" data-tab="focus" id="focusTab">Focus</button>
        <button data-tab="abilities" id="abilitiesTab">Abilities</button>
        <button data-tab="skills" id="skillsTab">Skills</button>
    </nav>

    <main>
        <section class="view active" id="focusView">
            <div class="block">
                <div class="compact-title">Focus Run <span class="hint" id="activeLabel">idle</span></div>
                <input id="taskTitle" placeholder="Task title">
                <div class="duration-row" id="durationRow">
                    <button data-minutes="5">5</button>
                    <button data-minutes="15">15</button>
                    <button data-minutes="25">25</button>
                    <button data-minutes="55">55</button>
                </div>
                <select id="intentType">
                    <option>Code</option>
                    <option>Writing</option>
                    <option>Research</option>
                    <option>Learning</option>
                    <option>Planning</option>
                    <option>Admin</option>
                    <option>Rest</option>
                </select>
                <div class="status-box" id="focusStatus">No active adventure</div>
                <div class="timer-card" data-active-session="false" id="timerCard">
                    <div class="timer-label" id="timerLabel">25:00</div>
                    <div class="timer-meta" id="timerMeta">Choose a task and start the focus timer.</div>
                    <div class="timer-bar" aria-hidden="true">
                        <div class="timer-fill" id="timerFill"></div>
                    </div>
                </div>
                <textarea id="focusSummary" placeholder="Outcome. Add 'make this reusable' to create a skill seed."></textarea>
                <div class="action-row">
                    <button class="primary" id="startButton">Start</button>
                    <button id="finishButton">Done</button>
                    <button id="partialButton">Part</button>
                    <button class="danger-action" id="interruptButton">Stop</button>
                </div>
                <div class="reward-box" id="rewardLine">Rewards appear after a run.</div>
                <div class="affinity-panel" id="affinityPanel">
                    <div class="compact-title">Affinity <span class="hint" id="affinityHint">First Meeting</span></div>
                    <div class="meta" id="affinityLine">Bond Lv 1 | 0 XP</div>
                    <div class="affinity-meter" aria-hidden="true">
                        <div class="affinity-fill" id="affinityFill"></div>
                    </div>
                    <div class="bond-collection" id="bondCollection"></div>
                </div>
            </div>
        </section>

        <section class="view" id="abilitiesView">
            <div class="block">
                <div class="compact-title">Ability Tree <span class="hint">AI growth</span></div>
                <div class="card-list" id="abilityList"></div>
            </div>
        </section>

        <section class="view" id="skillsView">
            <div class="block">
                <div class="compact-title">Skill Cards <span class="hint">pet abilities</span></div>
                <div class="card-list" id="skillCardList"></div>
            </div>
            <div class="block">
                <div class="compact-title">Recent Runs <span class="hint">forge seeds</span></div>
                <div class="card-list" id="recentRuns"></div>
            </div>
        </section>
    </main>
</div>

<script>
const petBridge = window.electronAPI;
const levelLine = document.getElementById('levelLine');
const tierBadge = document.getElementById('tierBadge');
const scriptStatus = document.getElementById('scriptStatus');
const focusTab = document.getElementById('focusTab');
const abilitiesTab = document.getElementById('abilitiesTab');
const skillsTab = document.getElementById('skillsTab');
const activeLabel = document.getElementById('activeLabel');
const taskTitle = document.getElementById('taskTitle');
const durationRow = document.getElementById('durationRow');
const intentType = document.getElementById('intentType');
const focusStatus = document.getElementById('focusStatus');
const timerCard = document.getElementById('timerCard');
const timerLabel = document.getElementById('timerLabel');
const timerMeta = document.getElementById('timerMeta');
const timerFill = document.getElementById('timerFill');
const focusSummary = document.getElementById('focusSummary');
const rewardLine = document.getElementById('rewardLine');
const startButton = document.getElementById('startButton');
const finishButton = document.getElementById('finishButton');
const partialButton = document.getElementById('partialButton');
const interruptButton = document.getElementById('interruptButton');
const abilityList = document.getElementById('abilityList');
const skillCardList = document.getElementById('skillCardList');
const recentRuns = document.getElementById('recentRuns');
const affinityHint = document.getElementById('affinityHint');
const affinityLine = document.getElementById('affinityLine');
const affinityFill = document.getElementById('affinityFill');
const bondCollection = document.getElementById('bondCollection');

let selectedDuration = 25;
let activeFocusSession = null;
let progressState = null;
let lastActiveSessionId = null;
let timerDoneNotified = false;

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
    })[char]);
}

function normalizeTab(tab) {
    return ['focus', 'abilities', 'skills'].includes(tab) ? tab : 'focus';
}

function setTab(tab) {
    const target = normalizeTab(tab);
    for (const name of ['focus', 'abilities', 'skills']) {
        document.getElementById(`${name}View`).classList.toggle('active', name === target);
        document.getElementById(`${name}Tab`).classList.toggle('active', name === target);
    }
}

function selectDuration(minutes) {
    selectedDuration = minutes;
    document.querySelectorAll('#durationRow button').forEach(button => {
        button.classList.toggle('active', Number(button.dataset.minutes) === minutes);
    });
    if (!activeFocusSession) updateFocusStatus();
}

function formatShortDate(value) {
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return '';
    return `${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
}

function padTimer(value) {
    return String(Math.max(0, Math.floor(value))).padStart(2, '0');
}

function formatTimerLabel(seconds, overtime = false) {
    const safeSeconds = Math.max(0, Math.floor(Number(seconds || 0)));
    const minutes = Math.floor(safeSeconds / 60);
    const remainder = safeSeconds % 60;
    return `${overtime ? '+' : ''}${padTimer(minutes)}:${padTimer(remainder)}`;
}

function getTimerState(session) {
    if (!session || session.status !== 'active') {
        const totalSeconds = selectedDuration * 60;
        return {
            active: false,
            elapsedSeconds: 0,
            remainingSeconds: totalSeconds,
            totalSeconds,
            progress: 0,
            isOvertime: false,
            label: formatTimerLabel(totalSeconds)
        };
    }

    const started = new Date(session.startedAt).getTime();
    const plannedMinutes = Number(session.plannedMinutes || selectedDuration || 25);
    const totalSeconds = Math.max(60, plannedMinutes * 60);
    const elapsedSeconds = Number.isFinite(started)
        ? Math.max(0, Math.floor((Date.now() - started) / 1000))
        : 0;
    const remainingSeconds = Math.max(0, totalSeconds - elapsedSeconds);
    const overtimeSeconds = Math.max(0, elapsedSeconds - totalSeconds);

    return {
        active: true,
        elapsedSeconds,
        remainingSeconds,
        totalSeconds,
        progress: totalSeconds > 0 ? Math.min(1, elapsedSeconds / totalSeconds) : 1,
        isOvertime: overtimeSeconds > 0,
        label: overtimeSeconds > 0
            ? formatTimerLabel(overtimeSeconds, true)
            : formatTimerLabel(remainingSeconds)
    };
}

function updateFocusButtons() {
    const hasActive = Boolean(activeFocusSession);
    startButton.disabled = hasActive;
    finishButton.disabled = !hasActive;
    partialButton.disabled = !hasActive;
    interruptButton.disabled = !hasActive;
    activeLabel.textContent = hasActive ? 'running' : 'idle';
}

function updateFocusStatus() {
    const timer = getTimerState(activeFocusSession);
    timerLabel.textContent = timer.label;
    timerFill.style.width = `${Math.round(timer.progress * 100)}%`;
    timerCard.dataset.activeSession = timer.active ? 'true' : 'false';
    timerCard.classList.toggle('overtime', timer.isOvertime);

    if (!activeFocusSession) {
        focusStatus.textContent = 'No active adventure';
        timerMeta.textContent = 'Choose a task and start the focus timer.';
        updateFocusButtons();
        return;
    }

    const elapsedMinutes = Math.floor(timer.elapsedSeconds / 60);
    const remainingMinutes = Math.ceil(timer.remainingSeconds / 60);
    focusStatus.textContent = `${activeFocusSession.taskTitle} | ${elapsedMinutes}/${activeFocusSession.plannedMinutes} min | ${activeFocusSession.intentType}`;
    timerMeta.textContent = timer.isOvertime
        ? 'Time is up. Add the outcome and finish the run.'
        : `${remainingMinutes} min left. Stay with the current adventure.`;
    if (!timerDoneNotified && timer.remainingSeconds === 0) {
        timerDoneNotified = true;
        rewardLine.textContent = 'Time is up. Add an outcome, then choose Done or Part.';
    }
    updateFocusButtons();
}

function renderAbilityCards(tree = {}) {
    const abilities = tree.abilities || [];
    abilityList.innerHTML = abilities.length ? abilities.map(ability => {
        const status = ability.unlocked ? 'Unlocked' : (ability.lockedReason || 'Locked');
        const action = ability.unlocked
            ? `<span class="pill">Ready</span>`
            : ability.canUnlock
                ? `<button class="mini-action" data-ability-id="${escapeHtml(ability.id)}">Unlock</button>`
                : `<span class="pill">${escapeHtml(status)}</span>`;
        return `
            <article class="ability-card ${ability.unlocked ? '' : 'locked'}">
                <div class="card-top">
                    <div class="card-title">${escapeHtml(ability.name)}</div>
                    ${action}
                </div>
                <div class="meta">${escapeHtml(ability.tier)} | Lv ${ability.levelRequired} | Cost ${ability.cost}</div>
                <div>${escapeHtml(ability.description)}</div>
            </article>
        `;
    }).join('') : '<div class="empty">No ability data yet.</div>';
}

function renderSkillCards(state = {}) {
    const skillCards = state.skillCards || [];
    skillCardList.innerHTML = skillCards.length ? skillCards.map(card => {
        const status = card.status || 'candidate';
        const action = status === 'candidate' && card.sourceSeedId
            ? `<button class="mini-action" data-skill-seed-id="${escapeHtml(card.sourceSeedId)}">Learn</button>`
            : `<span class="pill">${escapeHtml(status === 'learned' ? 'Learned' : status)}</span>`;
        return `
            <article class="skill-card ${status === 'locked' ? 'locked' : ''}">
                <div class="card-top">
                    <div class="card-title">${escapeHtml(card.name)}</div>
                    <span class="pill">${escapeHtml(card.rarity || 'common')}</span>
                </div>
                <div class="meta">${escapeHtml(status)} | Lv ${card.level || 1}</div>
                <div>${escapeHtml(card.description || 'A pet skill card.')}</div>
                ${action}
            </article>
        `;
    }).join('') : '<div class="empty">Finish reusable focus runs to discover Skill Seeds.</div>';
}

function renderRecentRuns(state = {}) {
    const sessions = (state.focusSessions || []).slice(-4).reverse();
    recentRuns.innerHTML = sessions.length ? sessions.map(session => {
        const hasSeed = (state.skillSeeds || []).some(seed => seed.sourceSessionId === session.id);
        const canTrySeed = session.summary && !hasSeed;
        const button = hasSeed
            ? '<span class="pill">Seeded</span>'
            : canTrySeed
                ? `<button class="mini-action" data-session-id="${escapeHtml(session.id)}">Seed</button>`
                : '<span class="pill">No summary</span>';
        return `
            <article class="run-card">
                <div class="card-top">
                    <div class="card-title">${escapeHtml(session.taskTitle || 'Focus Run')}</div>
                    ${button}
                </div>
                <div class="meta">${escapeHtml(session.status || 'done')} | ${session.actualMinutes || 0} min | ${formatShortDate(session.endedAt)}</div>
                <div>${escapeHtml(session.summary || 'No outcome saved.')}</div>
            </article>
        `;
    }).join('') : '<div class="empty">No completed focus runs yet.</div>';
}

function renderBondItems(state = {}) {
    const catalog = state.bondItemCatalog || [];
    const unlocked = new Set((state.bondItems || []).map(item => item.id));
    bondCollection.innerHTML = catalog.length ? catalog.map(item => {
        const isUnlocked = unlocked.has(item.id);
        return `
            <div class="bond-card ${isUnlocked ? '' : 'locked'}">
                <div>${escapeHtml(item.name || item.id)}</div>
                <div class="meta">${isUnlocked ? 'Unlocked' : `Lv ${item.levelRequired}`}</div>
            </div>
        `;
    }).join('') : '<div class="empty">No bond collection yet.</div>';
}

function renderAffinityProgress(state = {}) {
    const tier = state.affinityTier || {
        level: state.affinityLevel || 1,
        name: 'First Meeting',
        xp: 0,
        nextXp: 40,
        currentXp: state.affinityXp || 0
    };
    const currentXp = Number(state.affinityXp || tier.currentXp || 0);
    const startXp = Number(tier.xp || 0);
    const nextXp = tier.nextXp === null ? null : Number(tier.nextXp || 0);
    const progress = nextXp
        ? Math.max(0, Math.min(1, (currentXp - startXp) / Math.max(1, nextXp - startXp)))
        : 1;
    affinityHint.textContent = tier.name || `Lv ${tier.level}`;
    affinityLine.textContent = nextXp
        ? `Bond Lv ${tier.level} | ${currentXp}/${nextXp} XP`
        : `Bond Lv ${tier.level} | ${currentXp} XP`;
    affinityFill.style.width = `${Math.round(progress * 100)}%`;
    renderBondItems(state);
}

function formatAffinityEvents(events = []) {
    const total = events.reduce((sum, event) => sum + Number(event.appliedXp || 0), 0);
    if (!total) return '';
    const unlocked = events.flatMap(event => event.unlockedBondItems || []);
    return `, +${total} bond${unlocked.length ? ', bond item' : ''}`;
}

function renderPetProgress(state) {
    if (!state) return;
    progressState = state;
    const nextActiveSession = state.activeFocusSession || null;
    const nextActiveSessionId = nextActiveSession?.id || null;
    if (nextActiveSessionId !== lastActiveSessionId) {
        timerDoneNotified = false;
        lastActiveSessionId = nextActiveSessionId;
    }
    activeFocusSession = nextActiveSession;
    const tree = state.abilityTree || { petLevel: state.petLevel || 1, tiers: [], abilities: [] };
    const tier = (tree.tiers || []).find(item => item.level === tree.petLevel);
    tierBadge.textContent = tier?.tier || 'Companion';
    levelLine.innerHTML = `
        <div class="stat">Lv ${tree.petLevel || 1}</div>
        <div class="stat">XP ${state.focusXp || 0}</div>
        <div class="stat">Fx ${state.abilityFragments || 0} / Sd ${state.stardust || 0}</div>
    `;
    renderAbilityCards(tree);
    renderSkillCards(state);
    renderRecentRuns(state);
    renderAffinityProgress(state);
    updateFocusStatus();
}

function renderOfflineProgress(message = 'Adventure backend unavailable. Restart Petclaw and try again.') {
    renderPetProgress({
        version: 1,
        petLevel: 1,
        focusXp: 0,
        stardust: 0,
        abilityFragments: 0,
        unlockedAbilities: ['warm-chat'],
        activeFocusSession: null,
        focusSessions: [],
        memories: [],
        skillSeeds: [],
        skills: [],
        affinityXp: 0,
        affinityLevel: 1,
        bondItems: [],
        affinityTier: { level: 1, name: 'First Meeting', xp: 0, nextXp: 40, currentXp: 0 },
        bondItemCatalog: [],
        abilityTree: {
            petLevel: 1,
            tiers: [{ level: 1, tier: 'Companion' }],
            abilities: []
        },
        skillCards: []
    });
    rewardLine.textContent = message;
}

async function loadPetProgress() {
    if (!petBridge) {
        renderOfflineProgress();
        return;
    }
    try {
        renderPetProgress(await petBridge.invoke('pet-progress-get'));
    } catch (err) {
        renderOfflineProgress(err.message || 'Progress unavailable');
    }
}

async function startFocusAdventure() {
    if (!petBridge) {
        renderOfflineProgress();
        return;
    }
    const result = await petBridge.invoke('focus-adventure-start', {
        taskTitle: taskTitle.value,
        plannedMinutes: selectedDuration,
        intentType: intentType.value
    });
    if (!result.success) {
        rewardLine.textContent = result.error || 'Could not start adventure';
        renderPetProgress(result.progress);
        return;
    }
    timerDoneNotified = false;
    rewardLine.textContent = 'Run started. Finish it to earn XP, fragments, and stardust.';
    renderPetProgress(result.progress);
}

async function finishFocusAdventure(status) {
    if (!petBridge) {
        renderOfflineProgress();
        return;
    }
    const result = await petBridge.invoke('focus-adventure-finish', {
        status,
        summary: focusSummary.value.trim()
    });
    if (!result.success) {
        rewardLine.textContent = result.error || 'Could not finish adventure';
        renderPetProgress(result.progress);
        return;
    }
    const rewards = result.session.rewards || {};
    rewardLine.textContent = `+${rewards.focusXp || 0} XP, +${rewards.abilityFragments || 0} Fx, +${rewards.stardust || 0} Sd${rewards.skillSeed ? ', Skill Seed' : ''}${formatAffinityEvents(result.affinityEvents)}`;
    focusSummary.value = '';
    renderPetProgress(result.progress);
}

async function unlockPetAbility(abilityId) {
    if (!petBridge) {
        renderOfflineProgress();
        return;
    }
    const result = await petBridge.invoke('pet-ability-unlock', abilityId);
    if (!result.success) {
        rewardLine.textContent = result.error || 'Ability locked';
    } else {
        rewardLine.textContent = 'Ability unlocked.';
    }
    renderPetProgress(result.progress);
}

async function createSkillSeedFromSession(sessionId) {
    if (!petBridge) {
        renderOfflineProgress();
        return;
    }
    const result = await petBridge.invoke('pet-skill-seed-create', { sessionId });
    if (!result.success) {
        rewardLine.textContent = result.error || 'Could not create Skill Seed';
    } else {
        rewardLine.textContent = 'Skill Seed created.';
        setTab('skills');
    }
    renderPetProgress(result.progress);
}

async function learnPetSkill(seedId) {
    if (!petBridge) {
        renderOfflineProgress();
        return;
    }
    const result = await petBridge.invoke('pet-skill-learn', { seedId });
    if (!result.success) {
        rewardLine.textContent = result.error || 'Could not learn Skill';
    } else {
        rewardLine.textContent = 'Skill learned.';
        setTab('skills');
    }
    renderPetProgress(result.progress);
}

function markScriptReady() {
    scriptStatus.textContent = 'Ready';
    scriptStatus.classList.remove('error');
    scriptStatus.classList.add('ready');
}

function markScriptError(error) {
    scriptStatus.textContent = 'Error';
    scriptStatus.classList.remove('ready');
    scriptStatus.classList.add('error');
    rewardLine.textContent = error?.message || 'Adventure UI script error';
}

function bindPetGameControls() {
    focusTab.addEventListener('click', () => setTab('focus'));
    abilitiesTab.addEventListener('click', () => setTab('abilities'));
    skillsTab.addEventListener('click', () => setTab('skills'));
    durationRow.addEventListener('click', (event) => {
        const button = event.target.closest('button[data-minutes]');
        if (!button) return;
        selectDuration(Number(button.dataset.minutes));
    });
    startButton.addEventListener('click', startFocusAdventure);
    finishButton.addEventListener('click', () => finishFocusAdventure('completed'));
    partialButton.addEventListener('click', () => finishFocusAdventure('partial'));
    interruptButton.addEventListener('click', () => finishFocusAdventure('interrupted'));
    abilityList.addEventListener('click', (event) => {
        const button = event.target.closest('button[data-ability-id]');
        if (!button) return;
        unlockPetAbility(button.dataset.abilityId);
    });
    recentRuns.addEventListener('click', (event) => {
        const button = event.target.closest('button[data-session-id]');
        if (!button) return;
        createSkillSeedFromSession(button.dataset.sessionId);
    });
    skillCardList.addEventListener('click', (event) => {
        const button = event.target.closest('button[data-skill-seed-id]');
        if (!button) return;
        learnPetSkill(button.dataset.skillSeedId);
    });
    markScriptReady();
}

const initialTab = new URLSearchParams(window.location.search).get('tab') || 'focus';
try {
    bindPetGameControls();
    setTab(initialTab);
    selectDuration(selectedDuration);
    loadPetProgress().catch(err => {
        rewardLine.textContent = err.message || 'Progress unavailable';
    });
    setInterval(updateFocusStatus, 1000);
} catch (err) {
    markScriptError(err);
}

if (petBridge) {
    petBridge.on('pet-progress-changed', renderPetProgress);
    petBridge.on('pet-game-tab', setTab);
}
</script>
</body>
</html>
