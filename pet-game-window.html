<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petclaw Adventure</title>
<style>
    * { box-sizing: border-box; }
    body {
        margin: 0;
        min-height: 100vh;
        background: #f6f6f2;
        color: #111;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
    }
    .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto auto 1fr;
    }
    header {
        padding: 14px 16px 10px;
        border-bottom: 3px solid #111;
        background: #fff;
    }
    h1 {
        margin: 0 0 8px;
        font-size: 18px;
        line-height: 1.2;
    }
    .level-line {
        padding: 8px;
        border: 2px dashed #777;
        background: #f6f6f2;
        font-size: 12px;
    }
    .tabs {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        border-bottom: 3px solid #111;
        background: #fff;
    }
    .tabs button,
    .actions button,
    .duration-row button,
    .ability-card button {
        border: 0;
        border-right: 2px solid #111;
        border-bottom: 2px solid #111;
        background: #fff;
        color: #111;
        min-height: 36px;
        font: inherit;
        font-size: 13px;
        cursor: pointer;
    }
    .tabs button:last-child { border-right: 0; }
    .tabs button.active,
    .actions button.primary,
    .duration-row button.active {
        background: #111;
        color: #fff;
    }
    main {
        min-height: 0;
        overflow: auto;
        padding: 14px;
    }
    .view { display: none; }
    .view.active {
        display: grid;
        gap: 12px;
    }
    .panel {
        border: 3px solid #111;
        background: #fff;
        padding: 12px;
        display: grid;
        gap: 10px;
        box-shadow: 5px 5px 0 rgba(0,0,0,0.18);
    }
    .panel-title {
        margin: 0;
        font-size: 15px;
        line-height: 1.25;
    }
    input,
    select,
    textarea {
        width: 100%;
        border: 2px solid #111;
        background: #fff;
        color: #111;
        padding: 9px;
        font: inherit;
        font-size: 13px;
        outline: none;
        border-radius: 0;
    }
    textarea {
        min-height: 86px;
        resize: vertical;
        line-height: 1.35;
    }
    .duration-row,
    .actions {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
    }
    .actions {
        grid-template-columns: 1.2fr 1fr 1fr;
    }
    .actions button,
    .duration-row button {
        border: 2px solid #111;
        box-shadow: inset -3px -3px 0 rgba(0,0,0,0.2);
    }
    .status-box {
        border: 2px dashed #777;
        background: #f6f6f2;
        padding: 10px;
        min-height: 42px;
        font-size: 13px;
        line-height: 1.35;
        overflow-wrap: anywhere;
    }
    .card-list {
        display: grid;
        gap: 10px;
    }
    .ability-card,
    .skill-card {
        border: 2px solid #111;
        background: #fff;
        padding: 10px;
        display: grid;
        gap: 6px;
        box-shadow: inset -3px -3px 0 rgba(0,0,0,0.08);
    }
    .ability-card.locked,
    .skill-card.locked {
        opacity: 0.62;
    }
    .card-title {
        font-weight: 800;
        font-size: 14px;
    }
    .meta {
        color: #666;
        font-size: 12px;
    }
    .empty {
        border: 2px dashed #777;
        padding: 14px;
        background: #fff;
        font-size: 13px;
    }
    button:disabled {
        opacity: 0.42;
        cursor: default;
    }
</style>
</head>
<body>
<div class="app">
    <header>
        <h1>Petclaw Adventure</h1>
        <div class="level-line" id="levelLine">Loading progress...</div>
    </header>
    <nav class="tabs">
        <button id="focusTab" onclick="setTab('focus')">Focus</button>
        <button id="abilitiesTab" onclick="setTab('abilities')">Abilities</button>
        <button id="skillsTab" onclick="setTab('skills')">Skills</button>
    </nav>
    <main>
        <section class="view" id="focusView">
            <div class="panel">
                <h2 class="panel-title">Focus Adventure</h2>
                <input id="taskTitle" placeholder="Task title">
                <div class="duration-row" id="durationRow">
                    <button data-minutes="15" onclick="selectDuration(15)">15</button>
                    <button data-minutes="25" onclick="selectDuration(25)">25</button>
                    <button data-minutes="45" onclick="selectDuration(45)">45</button>
                    <button data-minutes="90" onclick="selectDuration(90)">90</button>
                </div>
                <select id="intentType">
                    <option>Code</option>
                    <option>Writing</option>
                    <option>Research</option>
                    <option>Learning</option>
                    <option>Planning</option>
                    <option>Admin</option>
                    <option>Rest</option>
                </select>
                <div class="status-box" id="focusStatus">No active adventure</div>
                <textarea id="focusSummary" placeholder="Outcome or reusable workflow summary"></textarea>
                <div class="actions">
                    <button class="primary" id="startButton" onclick="startFocusAdventure()">Start</button>
                    <button id="finishButton" onclick="finishFocusAdventure('completed')">Finish</button>
                    <button id="partialButton" onclick="finishFocusAdventure('partial')">Partial</button>
                </div>
                <button id="interruptButton" onclick="finishFocusAdventure('interrupted')">Interrupt</button>
                <div class="status-box" id="rewardLine">Rewards will appear here.</div>
            </div>
        </section>

        <section class="view" id="abilitiesView">
            <div class="panel">
                <h2 class="panel-title">Ability Tree</h2>
                <div class="card-list" id="abilityList"></div>
            </div>
        </section>

        <section class="view" id="skillsView">
            <div class="panel">
                <h2 class="panel-title">Skill Book</h2>
                <div class="card-list" id="skillCardList"></div>
            </div>
        </section>
    </main>
</div>

<script>
const electronAPI = window.electronAPI;
const levelLine = document.getElementById('levelLine');
const taskTitle = document.getElementById('taskTitle');
const intentType = document.getElementById('intentType');
const focusStatus = document.getElementById('focusStatus');
const focusSummary = document.getElementById('focusSummary');
const rewardLine = document.getElementById('rewardLine');
const startButton = document.getElementById('startButton');
const finishButton = document.getElementById('finishButton');
const partialButton = document.getElementById('partialButton');
const interruptButton = document.getElementById('interruptButton');
const abilityList = document.getElementById('abilityList');
const skillCardList = document.getElementById('skillCardList');

let selectedDuration = 25;
let activeFocusSession = null;
let progressState = null;

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
    })[char]);
}

function normalizeTab(tab) {
    return ['focus', 'abilities', 'skills'].includes(tab) ? tab : 'focus';
}

function setTab(tab) {
    const target = normalizeTab(tab);
    for (const name of ['focus', 'abilities', 'skills']) {
        document.getElementById(`${name}View`).classList.toggle('active', name === target);
        document.getElementById(`${name}Tab`).classList.toggle('active', name === target);
    }
}

function selectDuration(minutes) {
    selectedDuration = minutes;
    document.querySelectorAll('#durationRow button').forEach(button => {
        button.classList.toggle('active', Number(button.dataset.minutes) === minutes);
    });
}

function updateFocusButtons() {
    const hasActive = Boolean(activeFocusSession);
    startButton.disabled = hasActive;
    finishButton.disabled = !hasActive;
    partialButton.disabled = !hasActive;
    interruptButton.disabled = !hasActive;
}

function updateFocusStatus() {
    if (!activeFocusSession) {
        focusStatus.textContent = 'No active adventure';
        return;
    }
    const started = new Date(activeFocusSession.startedAt).getTime();
    const elapsed = Number.isFinite(started)
        ? Math.max(0, Math.floor((Date.now() - started) / 60000))
        : 0;
    focusStatus.textContent = `${activeFocusSession.taskTitle} | ${elapsed}/${activeFocusSession.plannedMinutes} min | ${activeFocusSession.intentType}`;
}

function renderPetProgress(state) {
    if (!state) return;
    progressState = state;
    activeFocusSession = state.activeFocusSession || null;
    const tree = state.abilityTree || { petLevel: state.petLevel || 1, tiers: [], abilities: [] };
    const tier = (tree.tiers || []).find(item => item.level === tree.petLevel);
    levelLine.textContent = `Level ${tree.petLevel} ${tier?.tier || 'Companion'} | XP ${state.focusXp || 0} | Fragments ${state.abilityFragments || 0} | Stardust ${state.stardust || 0}`;

    abilityList.innerHTML = (tree.abilities || []).map(ability => {
        const status = ability.unlocked ? 'Unlocked' : (ability.lockedReason || 'Locked');
        const action = ability.unlocked
            ? `<div class="meta">${status}</div>`
            : ability.canUnlock
                ? `<button onclick="unlockPetAbility('${ability.id}')">Unlock</button>`
                : `<div class="meta">${escapeHtml(status)}</div>`;
        return `
            <article class="ability-card ${ability.unlocked ? '' : 'locked'}">
                <div class="card-title">${escapeHtml(ability.name)}</div>
                <div class="meta">${escapeHtml(ability.tier)} | Cost ${ability.cost}</div>
                <div>${escapeHtml(ability.description)}</div>
                ${action}
            </article>
        `;
    }).join('');

    const skillCards = state.skillCards || [];
    skillCardList.innerHTML = skillCards.length ? skillCards.map(card => `
        <article class="skill-card ${card.status === 'locked' ? 'locked' : ''}">
            <div class="card-title">${escapeHtml(card.name)}</div>
            <div class="meta">${escapeHtml(card.rarity || 'common')} | ${escapeHtml(card.status || 'candidate')} | Lv ${card.level || 1}</div>
            <div>${escapeHtml(card.description || 'A pet skill card.')}</div>
        </article>
    `).join('') : '<div class="empty">No skills yet. Finish reusable focus adventures to discover Skill Seeds.</div>';

    updateFocusStatus();
    updateFocusButtons();
}

async function loadPetProgress() {
    if (!electronAPI) return;
    renderPetProgress(await electronAPI.invoke('pet-progress-get'));
}

async function startFocusAdventure() {
    if (!electronAPI) return;
    const result = await electronAPI.invoke('focus-adventure-start', {
        taskTitle: taskTitle.value,
        plannedMinutes: selectedDuration,
        intentType: intentType.value
    });
    if (!result.success) {
        rewardLine.textContent = result.error || 'Could not start adventure';
        renderPetProgress(result.progress);
        return;
    }
    rewardLine.textContent = 'Adventure started. The pet will turn this focus into growth.';
    renderPetProgress(result.progress);
}

async function finishFocusAdventure(status) {
    if (!electronAPI) return;
    const result = await electronAPI.invoke('focus-adventure-finish', {
        status,
        summary: focusSummary.value.trim()
    });
    if (!result.success) {
        rewardLine.textContent = result.error || 'Could not finish adventure';
        renderPetProgress(result.progress);
        return;
    }
    const rewards = result.session.rewards;
    rewardLine.textContent = `+${rewards.focusXp} XP, +${rewards.abilityFragments} fragments, +${rewards.stardust} stardust${rewards.skillSeed ? ', Skill Seed found' : ''}`;
    focusSummary.value = '';
    renderPetProgress(result.progress);
}

async function unlockPetAbility(abilityId) {
    if (!electronAPI) return;
    const result = await electronAPI.invoke('pet-ability-unlock', abilityId);
    if (!result.success) {
        rewardLine.textContent = result.error || 'Ability locked';
    } else {
        rewardLine.textContent = 'Ability unlocked.';
    }
    renderPetProgress(result.progress);
}

const initialTab = new URLSearchParams(window.location.search).get('tab') || 'focus';
setTab(initialTab);
selectDuration(selectedDuration);
loadPetProgress().catch(err => {
    rewardLine.textContent = err.message || 'Progress unavailable';
});
setInterval(updateFocusStatus, 15000);

if (electronAPI) {
    electronAPI.on('pet-progress-changed', renderPetProgress);
    electronAPI.on('pet-game-tab', setTab);
}
</script>
</body>
</html>
